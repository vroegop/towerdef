<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tower Designs (dev — throwaway)</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English&display=swap"
    />
    <style>
      :root {
        --parch: #e9dcc0;
        --parch-lt: #f3e9d2;
        --parch-dk: #d8c8a8;
        --ink: #2a1a08;
        --ink-dim: #7a5a2a;
        --rule: #b09a6a;
        --crimson: #9a2a1a;
        --gold-ink: #9a6a1a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: 'IM Fell English', Georgia, serif;
        background: #2b1d10;
        background-image: radial-gradient(circle at 50% -10%, #3a2814, #20140a 70%);
        min-height: 100vh;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        align-items: center;
        padding: 12px 20px;
        background: #c9b285;
        background-image: radial-gradient(circle at 30% 0%, var(--parch-lt), #c3ad80 80%);
        border-bottom: 3px double #7a5a2a;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      }
      header h1 {
        margin: 0;
        font-family: 'Cinzel Decorative', serif;
        font-weight: 900;
        font-size: 20px;
        color: var(--ink);
        letter-spacing: 0.02em;
      }
      header .tag {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        color: var(--ink-dim);
        border: 1px solid var(--rule);
        border-radius: 4px;
        padding: 2px 8px;
        background: rgba(255, 255, 255, 0.28);
      }
      header .toggles { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
      label.tog {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: 'Cinzel', serif;
        font-size: 13px;
        color: var(--ink);
        cursor: pointer;
        user-select: none;
      }
      label.tog input { accent-color: var(--crimson); width: 15px; height: 15px; }

      main {
        padding: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
        gap: 18px;
        max-width: 1500px;
        margin: 0 auto;
      }
      .card {
        background: var(--parch);
        background-image: radial-gradient(circle at 30% 8%, var(--parch-lt), #e3d3b0 72%);
        border: 1px solid #8a6a3a;
        border-radius: 6px;
        box-shadow: inset 0 0 0 3px #8a6a3a, 0 10px 24px rgba(0, 0, 0, 0.45);
        padding: 12px 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card .head { display: flex; align-items: baseline; gap: 8px; }
      .card .no {
        font-family: 'Cinzel Decorative', serif;
        font-weight: 900;
        font-size: 13px;
        color: var(--crimson);
        flex: 0 0 auto;
      }
      .card .nm {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        font-size: 15px;
        color: var(--ink);
      }
      .card canvas {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 4px;
        cursor: pointer;
      }
      .card .sub {
        font-size: 13px;
        line-height: 1.35;
        color: var(--ink-dim);
        border-top: 1px dotted var(--rule);
        padding-top: 7px;
        min-height: 54px;
      }
      .card .sub b { color: var(--ink); }
      footer {
        text-align: center;
        color: #b8a06a;
        font-family: 'Cinzel', serif;
        font-size: 12px;
        padding: 8px 20px 30px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Tower Bestiary</h1>
      <span class="tag">dev preview — throwaway, not wired into the game</span>
      <div class="toggles">
        <label class="tog"><input id="tBg" type="checkbox" checked /> Battle-map</label>
        <label class="tog"><input id="tRange" type="checkbox" /> Range ring</label>
        <label class="tog"><input id="tFoes" type="checkbox" /> Sample foes</label>
        <label class="tog"><input id="tPause" type="checkbox" /> Pause</label>
      </div>
    </header>
    <main id="grid"></main>
    <footer>Top-down · click any tower to enlarge · drawn in the live renderer's canvas idiom</footer>

    <script>
      'use strict';
      const TAU = Math.PI * 2;
      const INK = 'rgba(38,26,10,0.85)';

      // ---- shared helpers (mirrors of src/render/canvas2d.ts idioms) ----
      function lighten(hex, amt) {
        const h = hex.replace('#', '');
        const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
        const m = (c) => Math.round(c + (255 - c) * amt);
        return `rgb(${m(r)},${m(g)},${m(b)})`;
      }
      function poly(ctx, x, y, r, n, rot) {
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const a = rot + (i / n) * TAU, px = x + Math.cos(a) * r, py = y + Math.sin(a) * r;
          i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
        }
        ctx.closePath();
      }
      function disc(ctx, x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); }
      function shadow(ctx, x, y, r, k) {
        ctx.fillStyle = 'rgba(30,20,8,0.4)';
        ctx.beginPath();
        ctx.ellipse(x, y + r * 0.45, r * (k || 1.2), r * 0.55, 0, 0, TAU);
        ctx.fill();
      }
      // pulsing arcane core shared by most towers
      function core(ctx, x, y, r, accent, t, intensity) {
        intensity = intensity == null ? 1 : intensity;
        const pulse = 0.82 + 0.18 * Math.sin(t * 3);
        ctx.save();
        ctx.shadowColor = accent;
        ctx.shadowBlur = r * 1.7 * pulse * intensity;
        const g = ctx.createRadialGradient(x - r * 0.12, y - r * 0.12, r * 0.04, x, y, r);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.45, accent);
        g.addColorStop(1, accent);
        ctx.fillStyle = g;
        disc(ctx, x, y, r * pulse);
        ctx.restore();
      }
      function inkRing(ctx, x, y, r, w) {
        ctx.lineWidth = w || 2;
        ctx.strokeStyle = INK;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, TAU);
        ctx.stroke();
      }
      // a small glowing rune glyph (used for orbiting runes)
      function rune(ctx, x, y, s, color, seed) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(seed);
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(1, s * 0.18);
        ctx.shadowColor = color;
        ctx.shadowBlur = s * 1.4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-s * 0.6, -s * 0.5); ctx.lineTo(s * 0.6, -s * 0.5);
        ctx.moveTo(0, -s * 0.5); ctx.lineTo(0, s * 0.5);
        ctx.moveTo(-s * 0.45, s * 0.5); ctx.lineTo(s * 0.45, s * 0.5);
        ctx.stroke();
        ctx.restore();
      }

      // ====================== THE 10 DESIGNS ======================
      // Each: draw(ctx, cx, cy, R, t).  R = tower radius in CSS px.

      // 1 — Stone Keep (the classic; refined baseline)
      function stoneKeep(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        const stone = ctx.createRadialGradient(cx - R * 0.35, cy - R * 0.35, R * 0.15, cx, cy, R);
        stone.addColorStop(0, '#928677'); stone.addColorStop(1, '#4a4339');
        ctx.fillStyle = stone; disc(ctx, cx, cy, R);
        const merlons = 10;
        ctx.fillStyle = '#5b5347';
        for (let i = 0; i < merlons; i++) {
          const a = (i / merlons) * TAU;
          ctx.save();
          ctx.translate(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
          ctx.rotate(a);
          ctx.fillRect(-R * 0.11, -R * 0.11, R * 0.22, R * 0.22);
          ctx.restore();
        }
        inkRing(ctx, cx, cy, R * 0.7, Math.max(2, R * 0.1));
        ctx.strokeStyle = 'rgba(38,26,10,0.65)';
        core(ctx, cx, cy, R * 0.5, '#4aa8ff', t);
        inkRing(ctx, cx, cy, R, 2);
      }

      // 2 — Wizard's Spire (top-down tiled cone tapering to a rune finial)
      function wizardSpire(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        const base = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
        base.addColorStop(0, '#6a5d7a'); base.addColorStop(1, '#33293f');
        ctx.fillStyle = base; poly(ctx, cx, cy, R, 8, -Math.PI / 8); ctx.fill();
        // stacked shingle rings, each darker & rotated → reads as a tapering roof
        const rings = 4;
        for (let i = 0; i < rings; i++) {
          const f = 1 - (i + 1) / (rings + 1);
          const rr = R * (0.92 - i * 0.2);
          ctx.fillStyle = lighten('#5a3f7a', 0.1 + f * 0.5);
          poly(ctx, cx, cy, rr, 8, -Math.PI / 8 + i * 0.18); ctx.fill();
          ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(30,18,40,0.6)'; ctx.stroke();
        }
        // radial ribs from finial to eaves
        ctx.strokeStyle = 'rgba(20,12,30,0.45)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = -Math.PI / 8 + (i / 8) * TAU;
          ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
        }
        ctx.stroke();
        // glowing star finial
        core(ctx, cx, cy, R * 0.26, '#b07cff', t, 1.2);
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(t * 0.6);
        ctx.fillStyle = '#fff'; ctx.shadowColor = '#c89cff'; ctx.shadowBlur = R * 0.8;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = (i / 10) * TAU, rr = i % 2 ? R * 0.12 : R * 0.34;
          const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
          i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
        inkRing(ctx, cx, cy, R, 2);
      }

      // 3 — Arcane Obelisk (floating rune monolith, runes orbiting)
      function arcaneObelisk(ctx, cx, cy, R, t) {
        const lift = Math.sin(t * 1.5) * R * 0.06;
        // double shadow sells the float
        ctx.fillStyle = 'rgba(30,20,8,0.30)';
        ctx.beginPath(); ctx.ellipse(cx, cy + R * 0.6, R * 1.0, R * 0.42, 0, 0, TAU); ctx.fill();
        const oy = cy - lift;
        // orbiting runes behind
        for (let i = 0; i < 3; i++) {
          const a = t * 0.9 + (i / 3) * TAU;
          if (Math.sin(a) >= 0) continue;
          rune(ctx, cx + Math.cos(a) * R * 1.15, oy + Math.sin(a) * R * 0.5, R * 0.18, 'rgba(56,224,208,0.5)', a);
        }
        // monolith: a rotated square with a beveled lit face
        ctx.save();
        ctx.translate(cx, oy); ctx.rotate(Math.PI / 4);
        const s = R * 0.95;
        const g = ctx.createLinearGradient(-s, -s, s, s);
        g.addColorStop(0, '#2b6f6a'); g.addColorStop(0.5, '#1d4a47'); g.addColorStop(1, '#0f2c2a');
        ctx.fillStyle = g; ctx.fillRect(-s * 0.6, -s * 0.6, s * 1.2, s * 1.2);
        ctx.strokeStyle = INK; ctx.lineWidth = 2; ctx.strokeRect(-s * 0.6, -s * 0.6, s * 1.2, s * 1.2);
        // etched glowing runes on the face
        ctx.strokeStyle = '#38e0d0'; ctx.shadowColor = '#38e0d0';
        ctx.shadowBlur = R * 0.5 * (0.7 + 0.3 * Math.sin(t * 4)); ctx.lineWidth = 2; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-s * 0.3, -s * 0.35); ctx.lineTo(-s * 0.3, s * 0.35);
        ctx.moveTo(-s * 0.3, 0); ctx.lineTo(s * 0.05, -s * 0.18);
        ctx.moveTo(s * 0.28, -s * 0.3); ctx.lineTo(s * 0.28, s * 0.3);
        ctx.moveTo(s * 0.1, s * 0.2); ctx.lineTo(s * 0.28, s * 0.05);
        ctx.stroke();
        ctx.restore();
        // orbiting runes in front
        for (let i = 0; i < 3; i++) {
          const a = t * 0.9 + (i / 3) * TAU;
          if (Math.sin(a) < 0) continue;
          rune(ctx, cx + Math.cos(a) * R * 1.15, oy + Math.sin(a) * R * 0.5, R * 0.22, '#38e0d0', a);
        }
      }

      // 4 — Druidic Heartwood (living tree-stump tower)
      function heartwood(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // swaying leaf clusters around the rim (drawn first → behind the trunk)
        for (let i = 0; i < 7; i++) {
          const a = (i / 7) * TAU + Math.sin(t * 1.2 + i) * 0.08;
          const lx = cx + Math.cos(a) * R * 1.02, ly = cy + Math.sin(a) * R * 1.02;
          ctx.save(); ctx.translate(lx, ly); ctx.rotate(a + Math.PI / 2);
          ctx.fillStyle = i % 2 ? '#5a8a2a' : '#6fbf4a';
          ctx.beginPath(); ctx.ellipse(0, 0, R * 0.16, R * 0.28, 0, 0, TAU); ctx.fill();
          ctx.restore();
        }
        // bark
        ctx.fillStyle = '#5a3d22'; disc(ctx, cx, cy, R);
        // growth rings
        for (let i = 0; i < 5; i++) {
          ctx.strokeStyle = i % 2 ? 'rgba(120,84,46,0.9)' : 'rgba(176,134,80,0.9)';
          ctx.lineWidth = R * 0.06;
          ctx.beginPath(); ctx.arc(cx, cy, R * (0.86 - i * 0.15), 0, TAU); ctx.stroke();
        }
        // glowing sap heart
        core(ctx, cx, cy, R * 0.32, '#7fe04a', t);
        inkRing(ctx, cx, cy, R, 2);
      }

      // 5 — Dwarven Forge (hexagonal furnace, embers rising)
      function dwarvenForge(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // iron hex body
        const g = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
        g.addColorStop(0, '#5a5650'); g.addColorStop(1, '#2c2925');
        ctx.fillStyle = g; poly(ctx, cx, cy, R, 6, 0); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = INK; ctx.stroke();
        // riveted band
        poly(ctx, cx, cy, R * 0.74, 6, 0);
        ctx.lineWidth = R * 0.08; ctx.strokeStyle = '#6b6660'; ctx.stroke();
        ctx.fillStyle = '#888079';
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * TAU;
          ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.74, cy + Math.sin(a) * R * 0.74, R * 0.06, 0, TAU); ctx.fill();
        }
        // furnace mouth: flickering ember core
        const flick = 0.85 + 0.15 * Math.sin(t * 17) + 0.05 * Math.sin(t * 31);
        ctx.save();
        ctx.shadowColor = '#ff7a2a'; ctx.shadowBlur = R * 1.4 * flick;
        const fg = ctx.createRadialGradient(cx, cy, R * 0.04, cx, cy, R * 0.5);
        fg.addColorStop(0, '#fff3c0'); fg.addColorStop(0.4, '#ff9a2a'); fg.addColorStop(1, '#b3331f');
        ctx.fillStyle = fg; disc(ctx, cx, cy, R * 0.46 * flick);
        ctx.restore();
        // rising sparks (stateless: derived from t)
        for (let i = 0; i < 6; i++) {
          const ph = (t * 0.9 + i * 0.37) % 1;
          const sx = cx + Math.sin(i * 2.3 + t) * R * 0.3;
          const sy = cy - ph * R * 1.3;
          ctx.globalAlpha = 1 - ph;
          ctx.fillStyle = ph < 0.5 ? '#ffd24a' : '#ff7a2a';
          ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
        }
        ctx.globalAlpha = 1;
        poly(ctx, cx, cy, R, 6, 0); ctx.lineWidth = 2; ctx.strokeStyle = INK; ctx.stroke();
      }

      // 6 — Cleric's Sanctum (marble temple, rotating radiance + pillars)
      function clericSanctum(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // expanding halo
        const halo = (t * 0.5) % 1;
        ctx.strokeStyle = `rgba(255,210,74,${(1 - halo) * 0.5})`;
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, R * (0.9 + halo * 0.5), 0, TAU); ctx.stroke();
        // marble base
        const g = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
        g.addColorStop(0, '#fbf6e8'); g.addColorStop(1, '#cdbf9a');
        ctx.fillStyle = g; disc(ctx, cx, cy, R);
        // ring of pillars
        ctx.fillStyle = '#e7dcc2';
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * TAU;
          ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.78, cy + Math.sin(a) * R * 0.78, R * 0.1, 0, TAU); ctx.fill();
          ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(120,96,50,0.6)'; ctx.stroke();
        }
        // rotating sun-rays
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(t * 0.4);
        ctx.fillStyle = 'rgba(255,210,74,0.55)'; ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = R * 0.6;
        for (let i = 0; i < 12; i++) {
          ctx.rotate(TAU / 12);
          ctx.beginPath(); ctx.moveTo(0, -R * 0.2); ctx.lineTo(R * 0.06, -R * 0.62); ctx.lineTo(-R * 0.06, -R * 0.62); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
        core(ctx, cx, cy, R * 0.3, '#ffd24a', t, 1.2);
        inkRing(ctx, cx, cy, R, 2);
      }

      // 7 — Necromancer's Eye (bone ribs, an eldritch slit eye)
      function necroEye(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // bone rib spikes around the rim
        ctx.fillStyle = '#d8d2bd';
        for (let i = 0; i < 12; i++) {
          const a = (i / 12) * TAU;
          ctx.save(); ctx.translate(cx + Math.cos(a) * R, cy + Math.sin(a) * R); ctx.rotate(a + Math.PI / 2);
          ctx.beginPath(); ctx.moveTo(0, -R * 0.26); ctx.lineTo(R * 0.1, R * 0.06); ctx.lineTo(-R * 0.1, R * 0.06); ctx.closePath(); ctx.fill();
          ctx.strokeStyle = 'rgba(60,55,40,0.5)'; ctx.lineWidth = 1; ctx.stroke();
          ctx.restore();
        }
        // dark stone body
        const g = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
        g.addColorStop(0, '#3a3340'); g.addColorStop(1, '#15121a');
        ctx.fillStyle = g; disc(ctx, cx, cy, R);
        // wisps orbiting
        for (let i = 0; i < 4; i++) {
          const a = -t * 1.3 + (i / 4) * TAU;
          ctx.fillStyle = 'rgba(110,240,122,0.5)'; ctx.shadowColor = '#6ef07a'; ctx.shadowBlur = R * 0.4;
          ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.7, cy + Math.sin(a) * R * 0.7, R * 0.06, 0, TAU); ctx.fill();
        }
        ctx.shadowBlur = 0;
        // the eldritch eye
        ctx.save();
        ctx.shadowColor = '#6ef07a'; ctx.shadowBlur = R * 0.9 * (0.7 + 0.3 * Math.sin(t * 2.5));
        ctx.fillStyle = '#0a160c';
        ctx.beginPath(); ctx.ellipse(cx, cy, R * 0.5, R * 0.3, 0, 0, TAU); ctx.fill();
        const eg = ctx.createRadialGradient(cx, cy, R * 0.02, cx, cy, R * 0.3);
        eg.addColorStop(0, '#d8ffd0'); eg.addColorStop(0.5, '#3dd06a'); eg.addColorStop(1, '#0d6a2a');
        ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(cx, cy, R * 0.28, 0, TAU); ctx.fill();
        // slit pupil
        ctx.fillStyle = '#05120a';
        ctx.beginPath(); ctx.ellipse(cx, cy, R * 0.05, R * 0.24, 0, 0, TAU); ctx.fill();
        ctx.restore();
        inkRing(ctx, cx, cy, R, 2);
      }

      // 8 — Crystal Conflux (radiating shards around a faceted gem)
      function crystalConflux(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R, 1.0);
        // shards radiating out, slow rotation + twinkle
        const n = 7;
        for (let i = 0; i < n; i++) {
          const a = t * 0.25 + (i / n) * TAU;
          const len = R * (0.95 + 0.12 * Math.sin(i * 1.7));
          ctx.save(); ctx.translate(cx, cy); ctx.rotate(a);
          const g = ctx.createLinearGradient(0, 0, len, 0);
          g.addColorStop(0, '#bff0ff'); g.addColorStop(1, '#2a8fd0');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(R * 0.28, 0); ctx.lineTo(len * 0.55, -R * 0.14); ctx.lineTo(len, 0); ctx.lineTo(len * 0.55, R * 0.14);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle = 'rgba(20,60,90,0.5)'; ctx.lineWidth = 1; ctx.stroke();
          // bright facet edge
          ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(R * 0.28, 0); ctx.lineTo(len, 0); ctx.stroke();
          ctx.restore();
        }
        // central faceted gem
        ctx.save();
        ctx.shadowColor = '#6fd0ff'; ctx.shadowBlur = R * 1.2 * (0.7 + 0.3 * Math.sin(t * 3));
        const gg = ctx.createRadialGradient(cx - R * 0.1, cy - R * 0.1, R * 0.02, cx, cy, R * 0.4);
        gg.addColorStop(0, '#ffffff'); gg.addColorStop(0.5, '#7fdcff'); gg.addColorStop(1, '#2a7fc0');
        ctx.fillStyle = gg; poly(ctx, cx, cy, R * 0.38, 6, t * 0.4); ctx.fill();
        ctx.restore();
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
        poly(ctx, cx, cy, R * 0.38, 6, t * 0.4); ctx.stroke();
        // facet lines
        ctx.strokeStyle = 'rgba(20,60,90,0.4)'; ctx.lineWidth = 1; ctx.beginPath();
        for (let i = 0; i < 6; i++) { const a = t * 0.4 + (i / 6) * TAU; ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * R * 0.38, cy + Math.sin(a) * R * 0.38); }
        ctx.stroke();
      }

      // 9 — Ranger's Watchtower (log palisade, planked deck, fanned arrows)
      function watchtower(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // ring of log ends (palisade)
        for (let i = 0; i < 11; i++) {
          const a = (i / 11) * TAU;
          const lx = cx + Math.cos(a) * R * 0.92, ly = cy + Math.sin(a) * R * 0.92;
          ctx.fillStyle = '#7a5230'; ctx.beginPath(); ctx.arc(lx, ly, R * 0.16, 0, TAU); ctx.fill();
          ctx.strokeStyle = '#4d3219'; ctx.lineWidth = 1.5; ctx.stroke();
          ctx.strokeStyle = 'rgba(60,40,20,0.6)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(lx, ly, R * 0.08, 0, TAU); ctx.stroke();
        }
        // planked deck
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, cy, R * 0.74, 0, TAU); ctx.clip();
        ctx.fillStyle = '#9a7048'; ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
        ctx.strokeStyle = 'rgba(70,46,24,0.6)'; ctx.lineWidth = 1.5;
        for (let i = -3; i <= 3; i++) { ctx.beginPath(); ctx.moveTo(cx - R, cy + i * R * 0.22); ctx.lineTo(cx + R, cy + i * R * 0.22); ctx.stroke(); }
        ctx.restore();
        // leafy camo canopy patches
        for (let i = 0; i < 3; i++) {
          const a = t * 0.2 + (i / 3) * TAU;
          ctx.fillStyle = 'rgba(90,140,50,0.55)';
          ctx.beginPath(); ctx.arc(cx + Math.cos(a) * R * 0.35, cy + Math.sin(a) * R * 0.35, R * 0.22, 0, TAU); ctx.fill();
        }
        // fanned arrows nocked, pointing out (the "shots")
        const aim = Math.sin(t * 0.8) * 0.5;
        ctx.strokeStyle = '#e8dcc0'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        for (let i = -1; i <= 1; i++) {
          const a = aim + i * 0.4;
          const tipx = cx + Math.cos(a) * R * 0.95, tipy = cy + Math.sin(a) * R * 0.95;
          const tailx = cx - Math.cos(a) * R * 0.2, taily = cy - Math.sin(a) * R * 0.2;
          ctx.beginPath(); ctx.moveTo(tailx, taily); ctx.lineTo(tipx, tipy); ctx.stroke();
          // arrowhead
          ctx.fillStyle = '#c9c2ad';
          ctx.save(); ctx.translate(tipx, tipy); ctx.rotate(a);
          ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-R * 0.12, -R * 0.06); ctx.lineTo(-R * 0.12, R * 0.06); ctx.closePath(); ctx.fill();
          ctx.restore();
          // fletching
          ctx.strokeStyle = '#6b8a3a';
          ctx.beginPath(); ctx.moveTo(tailx, taily); ctx.lineTo(tailx - Math.cos(a - 0.5) * R * 0.12, taily - Math.sin(a - 0.5) * R * 0.12); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(tailx, taily); ctx.lineTo(tailx - Math.cos(a + 0.5) * R * 0.12, taily - Math.sin(a + 0.5) * R * 0.12); ctx.stroke();
          ctx.strokeStyle = '#e8dcc0';
        }
        inkRing(ctx, cx, cy, R, 2);
      }

      // 10 — Elemental Nexus (four element nodes + swirling vortex)
      function elementalNexus(ctx, cx, cy, R, t) {
        shadow(ctx, cx, cy, R);
        // dark dais
        ctx.fillStyle = '#2a2630'; disc(ctx, cx, cy, R);
        inkRing(ctx, cx, cy, R, 2);
        ctx.strokeStyle = 'rgba(180,160,120,0.5)'; inkRing(ctx, cx, cy, R * 0.82, 1.5);
        // four element nodes at N/E/S/W
        const els = [
          { c: '#ff5a2a', g: '#ffb060' }, // fire
          { c: '#3aa0ff', g: '#bfe4ff' }, // water
          { c: '#6fbf4a', g: '#c8eca0' }, // earth
          { c: '#dfeaf0', g: '#ffffff' }, // air
        ];
        for (let i = 0; i < 4; i++) {
          const a = -Math.PI / 2 + (i / 4) * TAU;
          const nx = cx + Math.cos(a) * R * 0.62, ny = cy + Math.sin(a) * R * 0.62;
          ctx.save(); ctx.shadowColor = els[i].c; ctx.shadowBlur = R * 0.5;
          const ng = ctx.createRadialGradient(nx, ny, R * 0.02, nx, ny, R * 0.22);
          ng.addColorStop(0, els[i].g); ng.addColorStop(1, els[i].c);
          ctx.fillStyle = ng; poly(ctx, nx, ny, R * 0.2, 3, a + Math.PI / 2); ctx.fill();
          ctx.restore();
        }
        // swirling vortex: rotating multicolor arcs
        ctx.save();
        ctx.translate(cx, cy);
        for (let i = 0; i < 4; i++) {
          ctx.rotate(t * 1.2 + (TAU / 4) * 0);
          ctx.strokeStyle = els[i].c; ctx.globalAlpha = 0.8; ctx.lineWidth = R * 0.1; ctx.lineCap = 'round';
          ctx.shadowColor = els[i].c; ctx.shadowBlur = R * 0.4;
          ctx.beginPath();
          ctx.arc(0, 0, R * 0.34, t * 1.2 + (i / 4) * TAU, t * 1.2 + (i / 4) * TAU + 1.1);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
        core(ctx, cx, cy, R * 0.16, '#ffffff', t, 1.4);
      }

      // ====================== REGISTRY ======================
      const DESIGNS = [
        { nm: 'Stone Keep', draw: stoneKeep, sub: 'The classic crenellated <b>watch-keep</b> with an arcane-blue ward at its heart. Reads instantly as "the fortress you defend."' },
        { nm: "Wizard's Spire", draw: wizardSpire, sub: 'A tiled conical <b>mage-tower</b> seen from above, ribbed roof tapering to a spinning rune-star finial. Violet arcana.' },
        { nm: 'Arcane Obelisk', draw: arcaneObelisk, sub: 'A <b>floating rune-monolith</b> hovering over its shadow, three glyphs orbiting. Teal etchings flare as it fires.' },
        { nm: 'Druidic Heartwood', draw: heartwood, sub: 'A living <b>tree-stump bastion</b> — bark, growth-rings and swaying leaves around a glowing green sap-heart.' },
        { nm: 'Dwarven Forge', draw: dwarvenForge, sub: 'A riveted <b>hex furnace-tower</b>; the open forge-mouth flickers ember-orange and throws rising sparks.' },
        { nm: "Cleric's Sanctum", draw: clericSanctum, sub: 'A marble <b>temple-rotunda</b> ringed by pillars, a slow halo and rotating sun-rays. Radiant gold.' },
        { nm: "Necromancer's Eye", draw: necroEye, sub: 'A bone-ribbed <b>eldritch obelisk</b> with a slit-pupil eye and sickly-green wisps circling. Ominous.' },
        { nm: 'Crystal Conflux', draw: crystalConflux, sub: 'A cluster of <b>ice-crystal shards</b> radiating from a faceted gem-core that twinkles as it charges.' },
        { nm: "Ranger's Watchtower", draw: watchtower, sub: 'A log-palisade <b>scout post</b> with a planked deck, leaf camo, and three nocked arrows tracking the field.' },
        { nm: 'Elemental Nexus', draw: elementalNexus, sub: 'Four <b>element nodes</b> (fire/water/earth/air) ringing a swirling vortex — for a tower that changes damage type.' },
      ];

      // ====================== BOARD WIRING ======================
      const opts = { bg: true, range: false, foes: false, paused: false };
      document.getElementById('tBg').onchange = (e) => (opts.bg = e.target.checked);
      document.getElementById('tRange').onchange = (e) => (opts.range = e.target.checked);
      document.getElementById('tFoes').onchange = (e) => (opts.foes = e.target.checked);
      document.getElementById('tPause').onchange = (e) => (opts.paused = e.target.checked);

      // sample enemy tokens (mirrors src/sim/registries.ts) to judge contrast on the board
      const FOES = [
        { s: 'square', c: '#ff6b6b' }, { s: 'triangle', c: '#4aa8ff' }, { s: 'diamond', c: '#37d7ff' },
        { s: 'pentagon', c: '#ff5db0' }, { s: 'hexagon', c: '#e64cff' }, { s: 'square', c: '#9aa7b3' },
      ];
      function drawFoe(ctx, x, y, r, shape, color) {
        ctx.save(); ctx.translate(x, y);
        const g = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.1, 0, 0, r * 1.1);
        g.addColorStop(0, lighten(color, 0.5)); g.addColorStop(1, color);
        ctx.fillStyle = g; ctx.shadowColor = color; ctx.shadowBlur = 8;
        if (shape === 'square') { ctx.fillRect(-r, -r, r * 2, r * 2); }
        else if (shape === 'triangle') { ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r * 0.9, r * 0.8); ctx.lineTo(-r * 0.9, r * 0.8); ctx.closePath(); ctx.fill(); }
        else if (shape === 'diamond') { ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath(); ctx.fill(); }
        else { poly(ctx, 0, 0, r, shape === 'pentagon' ? 5 : 6, -Math.PI / 2); ctx.fill(); }
        ctx.shadowBlur = 0; ctx.lineWidth = 1.5; ctx.strokeStyle = INK;
        if (shape === 'square') ctx.strokeRect(-r, -r, r * 2, r * 2); else ctx.stroke();
        ctx.restore();
      }

      function tile(ctx, W, H, cx, cy) {
        if (opts.bg) {
          ctx.fillStyle = '#0b0d0a'; ctx.fillRect(0, 0, W, H);
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.72);
          g.addColorStop(0, '#ecdcb6'); g.addColorStop(0.55, '#dcc596'); g.addColorStop(1, '#b89a62');
          ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = 'rgba(90,60,25,.16)'; ctx.lineWidth = 1; ctx.beginPath();
          for (let x = 0; x <= W; x += 30) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
          for (let y = 0; y <= H; y += 30) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
          ctx.stroke();
        } else {
          ctx.fillStyle = '#e6d6b4'; ctx.fillRect(0, 0, W, H);
        }
        ctx.strokeStyle = 'rgba(60,40,15,.55)'; ctx.lineWidth = 6; ctx.strokeRect(3, 3, W - 6, H - 6);
      }

      const cells = [];
      const grid = document.getElementById('grid');
      DESIGNS.forEach((d, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML =
          `<div class="head"><span class="no">${String(i + 1).padStart(2, '0')}</span><span class="nm">${d.nm}</span></div>` +
          `<canvas></canvas><div class="sub">${d.sub}</div>`;
        grid.appendChild(card);
        const cv = card.querySelector('canvas');
        cv.onclick = () => openZoom(d);
        cells.push({ d, cv, ctx: cv.getContext('2d'), w: 0, h: 0 });
      });

      function fit(cell) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssW = cell.cv.clientWidth, cssH = cell.cv.clientHeight;
        if (cssW === cell.w && cssH === cell.h) return;
        cell.w = cssW; cell.h = cssH;
        cell.cv.width = Math.floor(cssW * dpr); cell.cv.height = Math.floor(cssH * dpr);
        cell.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function paint(ctx, W, H, d, t) {
        const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.3;
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        ctx.beginPath(); ctx.rect(3, 3, W - 6, H - 6); ctx.clip();
        tile(ctx, W, H, cx, cy);
        if (opts.range) {
          ctx.strokeStyle = 'rgba(95,62,24,.45)'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 6]);
          ctx.beginPath(); ctx.arc(cx, cy, Math.min(W, H) * 0.46, 0, TAU); ctx.stroke(); ctx.setLineDash([]);
        }
        if (opts.foes) {
          for (let i = 0; i < FOES.length; i++) {
            const a = (i / FOES.length) * TAU + t * 0.15;
            drawFoe(ctx, cx + Math.cos(a) * Math.min(W, H) * 0.42, cy + Math.sin(a) * Math.min(W, H) * 0.42, R * 0.18, FOES[i].s, FOES[i].c);
          }
        }
        d.draw(ctx, cx, cy, R, t);
        ctx.restore();
      }

      let t0 = performance.now(), tHold = 0;
      function loop(now) {
        const t = opts.paused ? tHold : (now - t0) / 1000;
        if (!opts.paused) tHold = t;
        for (const cell of cells) { fit(cell); paint(cell.ctx, cell.w, cell.h, cell.d, t); }
        if (zoom.open) { fit(zoom); paint(zoom.ctx, zoom.w, zoom.h, zoom.d, t); }
        requestAnimationFrame(loop);
      }

      // ---- click-to-enlarge overlay ----
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(20,12,6,.8);z-index:50;cursor:zoom-out;';
      const big = document.createElement('canvas');
      big.style.cssText = 'width:min(560px,86vw);height:min(560px,86vw);border-radius:8px;box-shadow:0 18px 50px rgba(0,0,0,.6);';
      overlay.appendChild(big);
      document.body.appendChild(overlay);
      const zoom = { open: false, d: null, cv: big, ctx: big.getContext('2d'), w: 0, h: 0 };
      function openZoom(d) { zoom.open = true; zoom.d = d; zoom.w = zoom.h = 0; overlay.style.display = 'flex'; }
      overlay.onclick = () => { zoom.open = false; overlay.style.display = 'none'; };

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
