<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Balance Dashboard (dev)</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: #0c0f16; color: #e6ebf2;
        font: 14px/1.4 system-ui, -apple-system, sans-serif;
      }
      header {
        position: sticky; top: 0; z-index: 10; background: #10141d; border-bottom: 1px solid #1d2533;
        padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      }
      header h1 { font-size: 15px; margin: 0 10px 0 0; font-weight: 700; }
      button, select { background: #1b2433; color: #e6ebf2; border: 1px solid #2a3650; border-radius: 6px; padding: 6px 10px; font: inherit; cursor: pointer; }
      button:hover { border-color: #3a4d72; }
      button.primary { background: #2563b8; border-color: #2f6fc9; }
      button.hot { border-color: #ff2e4e; box-shadow: 0 0 0 1px #ff2e4e44; }
      button:disabled { opacity: 0.4; cursor: default; }
      #stop:not(:disabled) { background: #7a1f2b; border-color: #b3303f; }
      .sep { width: 1px; align-self: stretch; background: #1d2533; margin: 0 4px; }
      .ctl { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #9fb0c6; }
      .ctl input { width: 64px; }
      .ctl [contenteditable] { min-width: 60px; background: #1b2433; border: 1px solid #2a3650; border-radius: 6px; padding: 4px 6px; }
      input[type='number'], input[type='range'] { background: #141a26; color: #e6ebf2; border: 1px solid #2a3650; border-radius: 5px; }
      input[type='number'] { width: 92px; padding: 3px 5px; font: 12px ui-monospace, monospace; }

      #results { padding: 10px 14px; background: #0e1320; border-bottom: 1px solid #1d2533; position: sticky; top: 49px; z-index: 9; }
      .resgrid { display: flex; flex-wrap: wrap; gap: 14px; }
      .stat { display: flex; flex-direction: column; }
      .stat span { font-size: 11px; color: #8aa; text-transform: uppercase; letter-spacing: .04em; }
      .stat b { font-size: 18px; }
      .perseed { color: #8aa; font-size: 12px; margin: 6px 0; }
      table.enemies { border-collapse: collapse; font-size: 12px; margin-top: 4px; }
      table.enemies th, table.enemies td { border: 1px solid #1d2533; padding: 2px 8px; text-align: right; }
      table.enemies th:first-child, table.enemies td:first-child,
      table.enemies th:nth-child(2), table.enemies td:nth-child(2) { text-align: left; color: #9fb0c6; }

      main { padding: 14px; }
      section { margin-bottom: 22px; }
      section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: #7d90a8; border-bottom: 1px solid #1d2533; padding-bottom: 4px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
      .grid > * { min-width: 0; } /* let grid items shrink so canvases never force overflow */
      .item { background: #121826; border: 1px solid #1d2533; border-radius: 8px; padding: 10px; min-width: 0; overflow: hidden; }
      .ihead { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
      .ihead b { font-size: 14px; }
      .isub { font-size: 11px; color: #7d90a8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .charts { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
      canvas.chart { display: block; width: 100%; max-width: 100%; min-width: 0; height: 110px; background: #0d121d; border-radius: 5px; }
      .sliderrow { display: flex; align-items: center; gap: 8px; margin: 8px 0 4px; min-width: 0; }
      .sliderrow input[type='range'] { flex: 1; min-width: 0; }
      .lvlnum { font: 12px ui-monospace, monospace; color: #9fb0c6; white-space: nowrap; flex: 0 0 auto; }
      .readout { display: block; width: 100%; min-width: 0; margin-bottom: 6px; font: 12px ui-monospace, monospace; color: #ffd24a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fields { display: flex; flex-wrap: wrap; gap: 6px; }
      .field { display: flex; flex-direction: column; gap: 2px; font-size: 10px; color: #7d90a8; }

      #exportwrap { position: fixed; inset: 0; background: #000a; display: flex; align-items: center; justify-content: center; z-index: 50; }
      #exportwrap.hide { display: none; }
      .exportcard { background: #121826; border: 1px solid #2a3650; border-radius: 10px; padding: 14px; width: min(760px, 92vw); }
      .exportcard textarea { width: 100%; height: 56vh; background: #0d121d; color: #cfe; border: 1px solid #2a3650; border-radius: 6px; font: 12px ui-monospace, monospace; padding: 8px; }
      .exportcard .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    </style>
  </head>
  <body>
    <header>
      <h1>⚖️ Balance Dashboard <span style="color:#7d90a8;font-weight:400">(dev — not shipped)</span></h1>
      <button id="recalc" class="primary">Recalculate</button>
      <button id="stop" disabled>Stop</button>
      <span class="sep"></span>
      <button id="p1">L1 all</button>
      <button id="p10">L10 all</button>
      <button id="p100">L100 all</button>
      <button id="p1000">L1000 all</button>
      <button id="pmax">Max all</button>
      <span class="sep"></span>
      <span class="ctl">tier
        <select id="tier"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      </span>
      <span class="ctl">seeds <span id="seeds" contenteditable="true">1</span></span>
      <span class="ctl">maxWave <input id="maxwave" type="number" value="10000" /></span>
      <span class="sep"></span>
      <button id="reset">Reset balance</button>
      <button id="export">Export JSON</button>
    </header>
    <div id="results">Click <b>Recalculate</b> to run the sim.</div>
    <main id="app"></main>

    <div id="exportwrap" class="hide">
      <div class="exportcard">
        <textarea id="exportbox" readonly></textarea>
        <div class="row">
          <button id="exportcopy">Copy</button>
          <button id="exportclose" class="primary">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="./dashboard.ts"></script>
  </body>
</html>
