<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HUD Style Gallery — SET A — PROTOTYPE</title>
<!--
  PROTOTYPE — throwaway. SET A (baseline-extreme look & feel).
  Sister doc: _prototype-hud-gallery-v2.html = SET B = same 6 themes, fully redesigned.
  6 styles: D&D · Arcade · Holographic · Terminal · Steampunk · Plants-vs-Horde.
  Each style inner nav: Home(main menu, has PLAY) · Upgrades · Cards · Labs(slots) · Play(in-game) · Notes.
  Out-of-game (Home/Upgrades/Labs) vs in-game (Play) are visually distinct on purpose.
  Upgrades layout is unique per theme. Labs use slots (running / open=selectable / locked).
  Buttons are dummy (toast only). One fixed mock state (G) so you compare FORM.
-->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cinzel+Decorative:wght@700&family=IM+Fell+English&family=Orbitron:wght@500;700;900&family=Press+Start+2P&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:#0b0c10;color:#e6e6e6;font-family:Inter,system-ui,sans-serif;overflow:hidden;
  --bg:#0b0c10;--panel:#16181f;--ink:#e6e6e6;--dim:#8a8a96;--accent:#5ad;--accent2:#f9a826;--line:#2a2e3a;--font:Inter,sans-serif;--radius:12px}
#stage{position:absolute;inset:0;overflow:auto}
.hud{min-height:100%;display:flex;flex-direction:column;font-family:var(--font);color:var(--ink)}
.muted{opacity:.6}
.bar{height:10px;background:var(--line);border-radius:6px;overflow:hidden}.bar>span{display:block;height:100%;background:var(--accent)}
.btn{font-family:var(--font);background:var(--accent);color:#06121a;border:0;border-radius:8px;padding:7px 13px;cursor:pointer;font-weight:800;font-size:12px;letter-spacing:.5px;white-space:nowrap}
.btn.ghost{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn:active{transform:translateY(1px)}.btn.flash{animation:flash .4s}@keyframes flash{0%{filter:brightness(1.9)}100%{filter:none}}
.btn.big{font-size:15px;padding:12px 22px}

/* inner nav (themed by vars; some themes override) */
.inav{display:flex;gap:6px;flex-wrap:wrap;padding:12px 14px;justify-content:center;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:6}
.inav button{font-family:var(--font);background:transparent;border:1px solid var(--line);color:var(--dim);padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;letter-spacing:.5px}
.inav button.active{background:var(--accent);color:#06121a;border-color:var(--accent);font-weight:800}
.inav button:hover{color:var(--ink)}
.inav .spacer{flex:1 1 100%;height:0}
.xlink{position:fixed;right:12px;top:10px;z-index:9999;background:#6c47ff;color:#fff;text-decoration:none;font:600 12px Inter;padding:7px 12px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.4)}

.content{flex:1;width:100%}
.sheet{max-width:880px;margin:0 auto;padding:24px}
.page-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}

/* ---- PLAY CTA (home) ---- */
.play-cta{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0}
.modecard{flex:1;min-width:160px;border:1px solid var(--line);border-radius:var(--radius);padding:16px;background:var(--panel);cursor:pointer}
.modecard:hover{border-color:var(--accent)}
.modecard .mc-t{font-weight:800;font-size:16px}.modecard .mc-s{color:var(--dim);font-size:12px;margin:4px 0 10px}

/* ---- CARDS (shared, literally "Cards") ---- */
.cards-h{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px;display:flex;flex-direction:column;gap:6px;position:relative}
.card.tier-gold{border-color:#e8b54a;box-shadow:0 0 0 1px #e8b54a55}
.card.tier-chroma{border-color:#b46bff;box-shadow:0 0 12px #b46bff55}
.card .card-top{display:flex;justify-content:space-between;align-items:center}
.card .card-cost{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#06121a;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.card .card-name{font-weight:800}
.card .card-art{font-size:30px;text-align:center;padding:4px 0}
.card .card-fx{font-size:12px;color:var(--dim);min-height:30px}
.card .card-stars{color:var(--accent2);letter-spacing:1px}
.card .card-btn{margin-top:auto}
.card.empty{align-items:center;justify-content:center;color:var(--dim);border-style:dashed;text-align:center;font-size:12px;min-height:120px}

/* ---- LABS shared bits ---- */
.lab-intro{color:var(--dim);font-size:13px;margin-bottom:14px;line-height:1.5}
.labslots{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.slot{position:relative;width:150px;min-height:180px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:14px 10px;text-align:center;cursor:default}
.slot .slabel{font-size:12px;margin-top:8px;font-weight:700}
.slot .smeta{font-size:11px;color:var(--dim)}
.slot.open{cursor:pointer;border:2px dashed var(--accent)}
.slot.open:hover{background:rgba(255,255,255,.05)}
.slot.locked{opacity:.55;filter:grayscale(.4)}
.slot .lock{position:absolute;top:8px;right:10px;font-size:14px}
.labselect{max-width:640px;margin:0 auto}
.ls-h{font-weight:800;letter-spacing:1px;margin:14px 0 12px}
.ls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ls-item{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px}
.ls-item .ls-name{font-weight:800}.ls-item .ls-fx{color:var(--dim);font-size:12px;margin:2px 0}
.ls-item .ls-meta{font-size:11px;color:var(--accent2);margin-bottom:8px}

/* ---- in-game (Play) shared ---- */
.arena-page{position:relative;min-height:78vh}
.ingame-bar{position:sticky;bottom:0;display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;font-weight:700;
  background:linear-gradient(transparent,rgba(0,0,0,.55) 40%);z-index:4}
.ingame-bar .bar{flex:1;max-width:220px}
.ingame-bar .ib-wave{color:var(--accent)}.ingame-bar .ib-gold{color:var(--accent2)}
.ig-menu{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);backdrop-filter:blur(3px)}
.ig-card{width:520px;max-width:92vw;border:1px solid var(--accent);border-radius:16px;background:var(--panel);padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.ig-tag{font-weight:900;letter-spacing:2px;color:var(--accent);font-size:18px}
.ig-sub{color:var(--dim);font-size:12px;margin:4px 0 14px}
.ig-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;margin-bottom:12px}
.ig-cards{font-size:12px;color:var(--dim);margin-bottom:14px}
.ig-chip{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 9px;margin:2px;color:var(--ink)}
.ig-actions{display:flex;gap:8px;flex-wrap:wrap}
.ingame-flag{position:absolute;left:14px;top:12px;z-index:5;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  border:1px solid var(--accent);color:var(--accent);padding:3px 9px;border-radius:999px;background:rgba(0,0,0,.35);animation:livepulse 1.6s ease-in-out infinite}
@keyframes livepulse{50%{opacity:.5}}

/* ---- shared radial arena (used by some themes) ---- */
.scene{position:relative;width:360px;height:340px;margin:6px auto}
.scene .tower{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:44px;z-index:3;filter:drop-shadow(0 0 12px var(--accent))}
.scene .ring2{position:absolute;left:50%;top:50%;width:120px;height:120px;transform:translate(-50%,-50%);border:1px solid var(--accent);border-radius:50%;opacity:.25;animation:ping 2.6s ease-out infinite}
@keyframes ping{0%{transform:translate(-50%,-50%) scale(.5);opacity:.5}100%{transform:translate(-50%,-50%) scale(2.6);opacity:0}}
.enemy{position:absolute;left:50%;top:50%;transform:rotate(var(--a))}
.enemy .arm{position:absolute;left:0;top:0;animation:approach 5s linear infinite}
@keyframes approach{0%{transform:translate(172px,-50%);opacity:0}10%{opacity:1}88%{opacity:1}100%{transform:translate(30px,-50%);opacity:.15}}
.enemy .arm>i{display:block;font-size:20px;transform:rotate(calc(-1*var(--a)));filter:drop-shadow(0 0 4px var(--accent2))}

/* questions */
.qintro{color:var(--dim);margin-bottom:16px;line-height:1.5}
.qrow{display:flex;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line);line-height:1.5}
.qrow .n{color:var(--accent);font-weight:800}

/* switcher + toast */
#switch{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:2px;background:#fff;color:#111;border-radius:999px;padding:4px;box-shadow:0 8px 30px rgba(0,0,0,.5);font:13px Inter}
#switch button{border:0;background:#111;color:#fff;border-radius:999px;width:34px;height:34px;cursor:pointer;font-size:16px}
#switch button:hover{background:#333}
#switch .lbl{padding:0 14px;min-width:240px;text-align:center;font-weight:700;white-space:nowrap}
#switch .lbl small{display:block;font-weight:400;opacity:.55;font-size:11px}
#count{position:fixed;left:14px;bottom:18px;z-index:9999;font:12px/1 JetBrains Mono,monospace;color:#888}
#toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);background:#111;color:#fff;padding:9px 18px;border-radius:10px;opacity:0;transition:opacity .2s;z-index:9998;font:13px Inter;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.4)}
#toast.show{opacity:.96}

/* =========================================================
   THEME VARS + BESPOKE
   ========================================================= */
/* ---- D&D (parchment, HEXAGONS) ---- */
body.theme-dnd{--ink:#2a1a08;--panel:rgba(255,255,255,.42);--dim:#7a5a2a;--accent:#7a4a1a;--accent2:#9a2a1a;--line:#b09a6a;--font:'IM Fell English',Georgia,serif;--radius:6px;background:#2b1d10}
.theme-dnd .hud{background:#e9dcc0;background-image:radial-gradient(circle at 30% 8%,#f3e9d2,#e3d3b0 70%);max-width:1000px;margin:0 auto;border-inline:3px double #8a6a3a}
.theme-dnd .inav{background:transparent;border-bottom:2px solid #7a5a2a}
.theme-dnd .inav button{font-family:Cinzel,serif;border:2px solid #7a5a2a;background:#c9b285;color:#2a1a08;box-shadow:2px 2px 0 #7a5a2a;border-radius:0}
.theme-dnd .inav button.active{background:#7a5a2a;color:#f3e9d2}
.theme-dnd h1{font-family:'Cinzel Decorative',serif;text-align:center;font-size:26px;margin:0 0 6px}
.theme-dnd .frame{border:2px solid #7a5a2a;border-radius:8px;padding:12px 14px;background:rgba(255,255,255,.32);margin-bottom:14px}
.theme-dnd .frame h3{font-family:Cinzel,serif;margin:0 0 8px;border-bottom:1px solid #7a5a2a;padding-bottom:4px;text-transform:uppercase;font-size:13px;letter-spacing:1px}
.theme-dnd .line{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted #b09a6a}
.hexgrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.hex{width:120px;height:108px;position:relative}
.hex .face{position:absolute;inset:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:#7a5a2a}
.hex .top{position:absolute;inset:3px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:#f3ead4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6px}
.hex .hx-k{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7a5a2a}
.hex .hx-v{font-family:Cinzel,serif;font-size:20px;font-weight:700}
.hex .hx-b{margin-top:2px;font-size:10px;border:1px solid #7a5a2a;border-radius:999px;padding:0 7px;cursor:pointer;background:#e9dcc0}
.hex.train .top{background:#efe0bf;cursor:pointer}
.theme-dnd .questboard{background:#7a5230;background-image:radial-gradient(circle,#8a6238 1px,transparent 1px);background-size:14px 14px;border:8px solid #4a2f18;border-radius:8px;padding:16px}
.theme-dnd .qslots{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.theme-dnd .scroll{width:150px;min-height:190px;background:#f3ead4;border:1px solid #b09a6a;border-radius:6px 6px 10px 10px;padding:12px;text-align:center;position:relative;box-shadow:0 6px 14px rgba(0,0,0,.4)}
.theme-dnd .scroll::before{content:"📌";position:absolute;top:-10px;left:50%;transform:translateX(-50%)}
.theme-dnd .scroll.locked{background:#d8c8a8;color:#8a7048}
.theme-dnd .scroll.open{border:2px dashed #7a4a1a;cursor:pointer;background:#efe0bf}

/* ---- ARCADE (pixel, vending shop, cartridges) ---- */
body.theme-arcade{--ink:#fff;--panel:#1a1a2e;--dim:#7f7faf;--accent:#ffd23f;--accent2:#06d6a0;--line:#3a3a5e;--font:'Press Start 2P',monospace;--radius:0px;background:#101018;background-image:linear-gradient(transparent 95%,rgba(255,255,255,.05) 0),linear-gradient(90deg,transparent 95%,rgba(255,255,255,.05) 0);background-size:24px 24px}
.theme-arcade .hud{max-width:920px;margin:0 auto;font-size:11px;line-height:1.9;image-rendering:pixelated}
.theme-arcade .inav{background:#1a1a2e;border-bottom:4px solid #fff}
.theme-arcade .inav button{border:3px solid #fff;border-radius:0;font-family:'Press Start 2P';font-size:9px;background:#1a1a2e;color:#fff;box-shadow:3px 3px 0 #000}
.theme-arcade .inav button.active{background:#ffd23f;color:#222}
.theme-arcade h1{font-size:16px;color:#ffd23f;text-shadow:3px 3px 0 #d62828;text-align:center;margin:0 0 16px}
.theme-arcade .panel{border:4px solid #fff;padding:14px;margin-bottom:14px;background:#1a1a2e;box-shadow:6px 6px 0 #000}
.theme-arcade .panel .ttl{color:#ffd23f;margin-bottom:8px}
.theme-arcade .l{display:flex;justify-content:space-between;padding:4px 0}
.theme-arcade .coin{color:#ffd23f}.theme-arcade .hearts{color:#ef476f}
.theme-arcade .blink{animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
.vending{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:5px solid #fff;background:#0c0c1a;box-shadow:8px 8px 0 #000}
.vmitem{border:2px solid #2a2a4a;padding:12px;text-align:center;background:#14142a;position:relative;min-height:120px;display:flex;flex-direction:column;justify-content:space-between}
.vmitem .price{color:#ffd23f}.vmitem .nm{color:#fff;font-size:9px;line-height:1.6}
.vmitem .lvl{color:#06d6a0;font-size:9px}
.vmslot{height:8px;background:#000;margin-top:8px;border:2px solid #2a2a4a}
.pxarena{position:relative;width:340px;height:240px;margin:0 auto;border:4px solid #fff;background:#05060f;box-shadow:6px 6px 0 #000;overflow:hidden}
.pxhero{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:26px}
.pxmob{position:absolute;font-size:18px;animation:march 4s linear infinite}@keyframes march{0%{top:-20px;opacity:0}10%{opacity:1}100%{top:200px;opacity:1}}
.cartbay{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.cart{width:140px;min-height:170px;border:4px solid #fff;background:#14142a;box-shadow:5px 5px 0 #000;padding:10px;text-align:center;display:flex;flex-direction:column;justify-content:space-between}
.cart.open{border-color:#ffd23f;cursor:pointer}.cart.locked{opacity:.5}
.cart .barpx{height:10px;background:#000;border:2px solid #fff;margin-top:6px}.cart .barpx>span{display:block;height:100%;background:#06d6a0}

/* ---- HOLOGRAPHIC (neon, radial, augment ring) ---- */
body.theme-holo{--ink:#7fdfff;--panel:rgba(0,80,120,.14);--dim:#4a90b0;--accent:#00cfff;--accent2:#fcee0a;--line:rgba(0,200,255,.3);--font:Orbitron,sans-serif;--radius:8px;background:#020610;background-image:radial-gradient(circle at 50% 40%,#06182e,#020610 70%)}
.theme-holo .inav{background:rgba(2,12,24,.6)}
.theme-holo .inav button{letter-spacing:2px;font-size:11px;border-radius:999px}
.theme-holo h1{letter-spacing:3px}
.theme-holo .full{position:relative;min-height:70vh}
.theme-holo .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center}
.theme-holo .center .hp{font-size:42px;font-weight:900;color:#eaffff;text-shadow:0 0 18px #00cfff}
.theme-holo .center .lab{letter-spacing:4px;font-size:11px;opacity:.7}
.theme-holo .spoke{position:absolute;font-size:11px;letter-spacing:1px;background:var(--panel);border:1px solid var(--line);padding:8px 12px;border-radius:8px;backdrop-filter:blur(4px)}
.theme-holo .spoke b{color:#eaffff;display:block;font-size:18px}
.theme-holo .tl{left:5%;top:14%}.theme-holo .tr{right:5%;top:14%;text-align:right}.theme-holo .bl{left:5%;bottom:18%}.theme-holo .br{right:5%;bottom:18%;text-align:right}
.theme-holo svg text{fill:#7fdfff}
.augring{position:relative;width:440px;height:440px;margin:10px auto}
.augchip{position:absolute;transform:translate(-50%,-50%);width:120px;text-align:center;background:var(--panel);border:1px solid var(--accent);border-radius:10px;padding:8px;backdrop-filter:blur(4px)}
.augchip .ac-k{font-size:10px;letter-spacing:1px;color:#bdf}.augchip .ac-v{font-weight:800;color:#fff}
.augchip .ac-bar{height:5px;background:#0a2a3a;margin:5px 0}.augchip .ac-bar>span{display:block;height:100%;background:var(--accent)}
.augchip .ac-b{font-size:10px;border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:1px 7px;cursor:pointer;background:transparent}
.augcore{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#eaffff}
.bays{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.bay{width:150px;min-height:180px;clip-path:polygon(12% 0,88% 0,100% 50%,88% 100%,12% 100%,0 50%);background:var(--panel);border:1px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;backdrop-filter:blur(4px)}
.bay.open{cursor:pointer;border-style:dashed}.bay.locked{opacity:.45}

/* ---- TERMINAL (mono, package table, downloads) ---- */
body.theme-tui{--ink:#c8e6c9;--panel:#0c0c0c;--dim:#5c6e5c;--accent:#66bb6a;--accent2:#ffca28;--line:#2e7d32;--font:'JetBrains Mono',monospace;--radius:6px;background:#0c0c0c}
.theme-tui .hud{max-width:1040px;margin:0 auto;font-size:13px;line-height:1.5}
.theme-tui .inav{background:#0c0c0c;border-bottom:1px solid #2e7d32}
.theme-tui .inav button{border-radius:4px}
.theme-tui .box{border:1px solid #2e7d32;border-radius:6px;padding:10px 12px;margin-bottom:10px;position:relative}
.theme-tui .box>.cap2{position:absolute;top:-9px;left:10px;background:#0c0c0c;padding:0 6px;color:#66bb6a}
.theme-tui .g{color:#66bb6a}.theme-tui .y{color:#ffca28}.theme-tui .r{color:#ef5350}.theme-tui .c{color:#4dd0e1}.theme-tui .dim2{color:#5c6e5c}
.theme-tui pre{margin:0;font-family:'JetBrains Mono';white-space:pre}
.theme-tui table{width:100%;border-collapse:collapse}.theme-tui td,.theme-tui th{padding:2px 8px;text-align:left}.theme-tui th{color:#66bb6a;border-bottom:1px solid #2e7d32}
.theme-tui tr:hover td{background:#0f1f0f}
.dlq{font-family:'JetBrains Mono'}
.dlrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed #1e3e1e}
.dlrow .bar{flex:1;max-width:240px;background:#0f1f0f}.dlrow.open{color:#66bb6a;cursor:pointer}.dlrow.locked{color:#5c6e5c}

/* ---- STEAMPUNK (brass, pipes/valves, alembics) ---- */
body.theme-steam{--ink:#f0e2c0;--panel:rgba(0,0,0,.25);--dim:#b89a5a;--accent:#e8c977;--accent2:#c98a2c;--line:#7a5a2a;--font:'IM Fell English',Georgia,serif;--radius:10px;background:#1c140c;background-image:radial-gradient(circle at 50% 0,#2e2014,#140d07 70%)}
.theme-steam .hud{max-width:960px;margin:0 auto}
.theme-steam .inav{background:linear-gradient(#2a1d10,#1a120a);border-bottom:3px solid #7a5a2a}
.theme-steam .inav button{font-family:Cinzel,serif;background:linear-gradient(#3a2a16,#241810);color:#e8c977;border:2px solid #7a5a2a}
.theme-steam .inav button.active{background:linear-gradient(#e8c977,#a8742c);color:#241810}

.flask .liq{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(#e8c977,#c98a2c);opacity:.85}
.flask .neck{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:18px;height:16px;border:3px solid #b8964c;border-bottom:0;background:#241810}

.alm-card .meter{height:8px;background:#e8efd0;border-radius:5px;margin:6px 0}.alm-card .meter>span{display:block;height:100%;background:#5aa02c;border-radius:5px}

<body class="theme-dnd">
<div id="stage"></div>
<a class="xlink" href="_prototype-hud-gallery-v2.html">↔ Set B (redesign)</a>
<div id="toast"></div>
<div id="switch"><button id="prev" title="prev (←)">‹</button><div class="lbl" id="lbl">—<small></small></div><button id="next" title="next (→)">›</button></div>
<div id="count"></div>

<script>
/* ============ fixed mock state ============ */
const G={hero:{hp:4820,hpMax:6000,shield:900,shieldMax:1200,atkSpeed:'7.0/s',crit:42,critDmg:'8.5×',dodge:27,armor:300,range:340,regen:48,lifesteal:6},
  wave:{n:137,max:142,clock:12,alive:88,count:140,tier:2},econ:{gold:184320,kills:20133,cores:512,tokens:35,cells:28},checkin:{next:412,banked:3}};
const UPG={Attack:[['Attack Speed',240,'7.0/s','1.2k'],['Ranged Damage',880,'+880','3.4k'],['Crit Chance',420,'42%','8.1k'],['Crit Damage',75,'8.5×','5.0k'],['Range',2900,'340m','2.2k'],['Multishot',3,'3 tgts','40k']],
  Defense:[['Health',6000,'+6000','4.0k'],['Regen',240,'48/s','2.6k'],['Dodge',300,'27%','9.0k'],['Armor',300,'-300','3.1k'],['Lifesteal',120,'6%','12k']],
  Economy:[['Coins/Wave',50,'+50','1.0k'],['Cash Bonus',80,'+160%','6.4k'],['Interest',30,'+6%','20k'],['Wave Cut',3,'-3s','2k']]};
const CARDS=[['Damage',7,'gold','+% all damage','⚔️'],['Execute',11,'chroma','instakill <8% HP','💀'],['Crit',4,'white','+ crit chance','🎯'],['Vitality',6,'gold','+ max health','❤️'],['Volley',9,'gold','+ projectiles','🏹'],['Fortune',3,'white','+ gold drops','🪙'],['Phantom',5,'white','+ dodge','👻'],['Bramble',8,'gold','reflect damage','🌵']];
const LAB_SLOTS=[{s:'running',k:'Damage Scale',lv:18,max:50,eta:'2h 14m'},{s:'open'},{s:'locked',need:'wave 45'},{s:'locked',need:'wave 60'},{s:'locked',need:'wave 100'}];
const LAB_PICK=[['Rate Scale','1h 40m','9 cells','+ attack rate'],['Crit Scale','48m','7 cells','+ crit power'],['HP Scale','3h 02m','14 cells','+ max health'],['Game Speed','11h 02m','40 cells','sim speed ×'],['Lab Speed','2h 12m','18 cells','− research time']];

/* ============ helpers ============ */
const fmt=n=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':''+n;
const pct=(v,m)=>Math.min(100,Math.round(v/m*100));
const mmss=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const bar=(v,m)=>`<div class="bar"><span style="width:${pct(v,m)}%"></span></div>`;
const allUpg=()=>[...UPG.Attack,...UPG.Defense,...UPG.Economy];

/* ============ shared pages ============ */
function secCards(){
  return `<div class="sheet"><div class="page-tag">main menu · out of run</div><div class="cards-h">Cards — 20 slots · upgrade with tokens</div>
    <div class="card-grid">
    ${CARDS.map(c=>`<div class="card tier-${c[2]}"><div class="card-top"><span class="card-cost">${Math.ceil(c[1]/3)}</span><span class="card-name">${c[0]}</span></div>
      <div class="card-art">${c[4]}</div><div class="card-fx">${c[3]}</div>
      <div class="card-stars">${'★'.repeat(Math.min(5,c[1]))}${c[1]>5?'+'+(c[1]-5):''} <span class="muted">${c[2]} · S${c[1]}/15</span></div>
      <button class="btn card-btn" data-act="Upgraded card ${c[0]} → ${c[1]+1}★ (mock)">Upgrade · ${5+c[1]*5}t</button></div>`).join('')}
    ${'<div class="card empty">empty<br>card slot</div>'.repeat(4)}
    </div></div>`;
}
function secQuestions(s){
  return `<div class="sheet"><div class="page-tag">my open design questions</div>
    <div class="qintro">${s.qintro||'I committed the visual direction; these are the calls I want your verdict on for this style.'}</div>
    ${s.questions.map((q,i)=>`<div class="qrow"><span class="n">Q${i+1}</span><span>${q}</span></div>`).join('')}</div>`;
}
function labSelectList(s){
  const L=s.lab;
  return `<div class="sheet"><div class="page-tag">${L.place} · choose research</div>
    <div class="labselect"><button class="btn ghost" data-labback>← back to ${L.place}</button>
    <div class="ls-h">Select a ${L.word} to ${L.verb.toLowerCase()} (slot 2)</div>
    <div class="ls-grid">${LAB_PICK.map(r=>`<div class="ls-item"><div class="ls-name">${r[0]}</div><div class="ls-fx">${r[3]}</div>
      <div class="ls-meta">${r[1]} · ${r[2]}</div>
      <button class="btn" data-labpick data-act="${L.verb}: ${r[0]} (mock)">${L.verb}</button></div>`).join('')}</div></div></div>`;
}
function ingameBar(){
  return `<div class="ingame-bar"><span>HP</span>${bar(G.hero.hp,G.hero.hpMax)}<b>${G.hero.hp}/${G.hero.hpMax}</b>
    <span class="ib-wave">W${G.wave.n}·T${G.wave.tier}·${G.wave.alive}/${G.wave.count}</span>
    <span class="ib-gold">◎${fmt(G.econ.gold)}</span><span style="flex:1"></span>
    <button class="btn ghost" data-act="Speed ×2 (mock)">×2</button>
    <button class="btn" data-ingame="open">❚❚ ${'%MENUWORD%'}</button></div>`;
}
function ingameMenuOverlay(s){
  return `<div class="ig-menu"><div class="ig-card">
    <div class="ig-tag">❚❚ ${s.ingameWord||'PAUSED'} · WAVE ${G.wave.n}</div>
    <div class="ig-sub">In-run menu — main-menu upgrades are locked mid-run by design.</div>
    <div class="ig-stats"><div>HP ${G.hero.hp}/${G.hero.hpMax}</div><div>Hostiles ${G.wave.alive}/${G.wave.count}</div><div>Gold ◎${fmt(G.econ.gold)}</div><div>Kills ${fmt(G.econ.kills)}</div></div>
    <div class="ig-cards">Active cards: ${CARDS.slice(0,5).map(c=>`<span class="ig-chip">${c[0]} ${c[1]}★</span>`).join('')}</div>
    <div class="ig-actions"><button class="btn" data-ingame="close">▶ Resume</button>
      <button class="btn ghost" data-act="Re-rolled in-run boon (mock)">Re-roll boon</button>
      <button class="btn ghost" data-act="Abandoned run (mock)">Abandon run</button></div></div></div>`;
}
function arenaPage(s){
  let scene=s.arena().replace('%MENUWORD%',s.ingameWord||'MENU');
  return `<div class="arena-page"><div class="ingame-flag">● live run</div>${scene}${ingameMenu?ingameMenuOverlay(s):''}</div>`;
}

/* ============ STYLE OBJECTS ============ */
const STYLES=[];
/* shared scene + widget helpers */
function spokes(n){let p='';for(let i=0;i<n;i++){const a=i/n*2*Math.PI;const x=180+Math.cos(a)*168,y=170+Math.sin(a)*158;p+=`<line x1="180" y1="170" x2="${x.toFixed(0)}" y2="${y.toFixed(0)}" stroke="var(--accent)" stroke-width="1" opacity="0.2"/>`;}return `<svg style="position:absolute;inset:0" width="360" height="340" viewBox="0 0 360 340">${p}</svg>`;}
function sceneRadial(o){const n=o.n||8;let e='';for(let i=0;i<n;i++){const a=i*(360/n)+(i%2?18:0);e+=`<div class="enemy" style="--a:${a}deg"><div class="arm" style="animation-delay:${(i*0.5).toFixed(2)}s;animation-duration:${(4.4+i%3*0.6).toFixed(1)}s"><i>${o.enemy(i)}</i></div></div>`;}return `<div class="scene">${o.lines?spokes(n):''}<div class="tower">${o.tower}</div>${e}<div class="ring2"></div></div>`;}
function hex(k,v){return `<div class="hex"><div class="face"></div><div class="top"><div class="hx-k">${k}</div><div class="hx-v">${v}</div></div></div>`;}
function hexUp(k,v,lv){return `<div class="hex train"><div class="face"></div><div class="top"><div class="hx-k">${k}</div><div class="hx-v">${v}</div><button class="hx-b" data-act="Trained ${k} (mock)">▲ L${lv}</button></div></div>`;}
function holoRing(){const r1=pct(G.hero.hp,G.hero.hpMax),r2=pct(G.hero.shield,G.hero.shieldMax);return `<svg style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)" width="420" height="420" viewBox="0 0 420 420"><circle cx="210" cy="210" r="190" fill="none" stroke="#0a3550" stroke-width="2" stroke-dasharray="4 8"/>${arc(210,210,164,r1,'#00cfff',14)}${arc(210,210,138,r2,'#fcee0a',8)}<circle cx="210" cy="210" r="108" fill="none" stroke="#103a52" stroke-width="1"/></svg>`;}
function arc(cx,cy,r,p,color,w){const a=p/100*270-135,rad=Math.PI/180;const x0=cx+r*Math.cos(-135*rad),y0=cy+r*Math.sin(-135*rad),x1=cx+r*Math.cos(a*rad),y1=cy+r*Math.sin(a*rad),big=(p/100*270)>180?1:0;return `<path d="M${x0} ${y0} A${r} ${r} 0 ${big} 1 ${x1} ${y1}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linecap="round" opacity="0.9"/>`;}
function dial(cap,p,val){const ang=-90+(p/100*180);return `<div class="gauge"><div class="dial"><div class="needle" style="transform:rotate(${ang}deg)"></div></div><div class="cap3">${cap}</div><div class="muted" style="font-size:12px">${val}</div></div>`;}

/* ---- 1 · D&D ---- */
STYLES.push({ id:'dnd', name:'D&D · Character Sheet', tag:'parchment · hex stats · quest-board labs', ingameWord:'PARLEY',
  lab:{word:'Quest',verb:'Undertake',place:'the Quest Board'},
  nav:{home:'Sheet',upgrades:'Advancement',cards:'Cards',labs:'Quests',play:'⚔ Adventure',questions:'Riddles'},
  home(){return `<div class="sheet"><div class="page-tag">main menu · out of run</div>
    <h1>Sir Vael, the Endless</h1>
    <div class="muted" style="text-align:center;margin-bottom:14px">Level ${G.wave.n} · Tier ${G.wave.tier} Realm · ${fmt(G.econ.gold)} gold · ${G.econ.cores} cores</div>
    <div class="hexgrid">${hex('Atk Spd',G.hero.atkSpeed)}${hex('Damage','+880')}${hex('Crit',G.hero.crit+'%')}${hex('Range',G.hero.range+'m')}${hex('Health',fmt(G.hero.hp))}${hex('Dodge',G.hero.dodge+'%')}</div>
    <div class="frame"><h3>Vitals</h3>
      <div class="line"><span>Hit Points</span><span>${G.hero.hp}/${G.hero.hpMax}</span></div>${bar(G.hero.hp,G.hero.hpMax)}
      <div class="line" style="margin-top:6px"><span>Ward (shield)</span><span>${G.hero.shield}/${G.hero.shieldMax}</span></div>
      <div class="line"><span>Next tithe (check-in)</span><span>${mmss(G.checkin.next)} · ${G.checkin.banked} banked</span></div></div>
    <div class="frame"><h3>Sally Forth</h3><div class="play-cta">
      <div class="modecard" data-page="play"><div class="mc-t">⚔ Campaign</div><div class="mc-s">Tier ${G.wave.tier} · resume wave ${G.wave.n}</div><button class="btn big" data-page="play">Adventure ▶</button></div>
      <div class="modecard" data-page="play"><div class="mc-t">♾ Endless Delve</div><div class="mc-s">push for milestone cores</div><button class="btn big" data-page="play">Descend ▶</button></div></div></div></div>`;},
  upgrades(){return `<div class="sheet"><div class="page-tag">main menu · advancement (locked mid-run)</div><h1>Advancement</h1>
    ${Object.entries(UPG).map(([cat,list])=>`<div class="frame"><h3>${cat==='Attack'?'Might':cat==='Defense'?'Ward':'Fortune'}</h3><div class="hexgrid">${list.map(u=>hexUp(u[0],u[2],u[1])).join('')}</div></div>`).join('')}</div>`;},
  labs(){return `<div class="sheet"><div class="page-tag">the Quest Board · research as commissioned quests</div>
    <div class="lab-intro">Pin a Quest to a board slot; it resolves over real time for a fixed reward — no further input. You start with one open commission, up to five.</div>
    <div class="questboard"><div class="qslots">${LAB_SLOTS.map(sl=>{
      if(sl.s==='running')return `<div class="scroll"><div style="font-size:24px">⏳</div><b>${sl.k}</b><div class="smeta">L${sl.lv}/${sl.max}</div>${bar(sl.lv,sl.max)}<div class="smeta">reward in ${sl.eta}</div></div>`;
      if(sl.s==='open')return `<div class="scroll open" data-labslot><div style="font-size:24px">✒️</div><b>Open commission</b><div class="smeta">click to post a Quest</div></div>`;
      return `<div class="scroll locked"><div style="font-size:24px">🔒</div><b>Sealed</b><div class="smeta">unlocks at ${sl.need}</div></div>`;}).join('')}</div></div></div>`;},
  arena(){return `<div class="sheet" style="padding-top:14px">${sceneRadial({tower:'🛡️',enemy:i=>['😈','🗡️','👹','🏹','💀','🐺'][i%6],n:8})}${ingameBar()}</div>`;},
  qintro:'D&D set: parchment sheet, hexagon stats, quest-board labs. The calls I want your verdict on:',
  questions:['Hexagon stat tiles look great but hold less text than rectangles — do long names like "Crit Damage 8.5×" fit inside hexes, or must we abbreviate?',
    'Labs-as-quests resolve to a fixed reward with no mid-quest input (just the wording). Is "post it and wait" satisfying, or do players want to influence a running quest?',
    'The Adventure (in-game) view reuses parchment + a "● live run" flag + a PARLEY pause. Distinct enough from the main menu, or should combat drop parchment for legibility?',
    'Advancement is locked mid-run per your rule — should it still be viewable read-only during a run, or fully hidden?',
    'Should hexes extend into a real skill-tree (linked, prerequisite hexes) rather than a flat grid?'] });

/* ---- 2 · Arcade ---- */
STYLES.push({ id:'arcade', name:'Arcade · Cabinet', tag:'pixel · vending shop · cartridge labs', ingameWord:'PAUSE',
  lab:{word:'Program',verb:'Load',place:'the Cartridge Bay'},
  nav:{home:'P1',upgrades:'SHOP',cards:'Cards',labs:'CART BAY',play:'▶ PLAY',questions:'README'},
  home(){const h=Math.round(pct(G.hero.hp,G.hero.hpMax)/20);return `<div class="sheet"><div class="page-tag">main menu · attract mode</div><h1>HORDE QUEST</h1>
    <div class="panel"><div class="ttl">PLAYER 1</div>
      <div class="l"><span>LIFE</span><span class="hearts">${'♥'.repeat(h)}${'♡'.repeat(5-h)}</span></div>
      <div class="l"><span>HP</span><span>${G.hero.hp}/${G.hero.hpMax}</span></div>
      <div class="l"><span>WAVE</span><span>${G.wave.n}</span></div>
      <div class="l"><span>COIN</span><span class="coin">◎ ${fmt(G.econ.gold)}</span></div>
      <div class="l"><span>NEXT DROP</span><span>${mmss(G.checkin.next)}</span></div></div>
    <div class="panel"><div class="ttl">INSERT COIN</div><div class="play-cta">
      <div class="modecard" data-page="play"><div class="mc-t coin">▶ 1P START</div><div class="mc-s">resume wave ${G.wave.n}</div></div>
      <div class="modecard" data-page="play"><div class="mc-t" style="color:#06d6a0">▶ TURBO</div><div class="mc-s">2× speed run</div></div></div>
      <div style="text-align:center" class="blink coin">◀ ▶ SWAP CABINET</div></div></div>`;},
  upgrades(){return `<div class="sheet"><div class="page-tag">main menu · SHOP (no buying mid-run)</div><h1>SHOP</h1>
    <div class="vending">${allUpg().map(u=>`<div class="vmitem"><div class="nm">${u[0]}</div><div class="lvl">L${u[1]}</div><div class="price coin">${u[3]}</div><button class="btn" data-act="Vended ${u[0]} (mock)">BUY</button><div class="vmslot"></div></div>`).join('')}</div>
    <div style="text-align:center;margin-top:12px" class="coin">CREDITS ◎ ${fmt(G.econ.gold)}</div></div>`;},

/* ============ wiring ============ */
const ORDER=['home','upgrades','cards','labs','play','questions'];
const stage=document.getElementById('stage'),lbl=document.getElementById('lbl');
const params=new URLSearchParams(location.search);
let idx=Math.max(0,STYLES.findIndex(s=>s.id===params.get('style')));if(idx<0)idx=0;
let page=ORDER.includes(params.get('page'))?params.get('page'):'home';
let labPick=false,ingameMenu=false;

function content(s){
  switch(page){
    case 'upgrades':return s.upgrades();
    case 'cards':return secCards();
    case 'labs':return labPick?labSelectList(s):s.labs();
    case 'play':return arenaPage(s);
    case 'questions':return secQuestions(s);
    default:return s.home();
  }
}
function render(){
  const s=STYLES[idx];document.body.className='theme-'+s.id;
  const nav=`<nav class="inav">${ORDER.map(k=>`<button data-page="${k}" class="${k===page?'active':''}">${s.nav[k]}</button>`).join('')}</nav>`;
  stage.innerHTML=`<div class="hud">${nav}<div class="content">${content(s)}</div></div>`;
  lbl.innerHTML=`${idx+1}/${STYLES.length} · ${s.name}<small>${s.tag}</small>`;
  document.getElementById('count').textContent=`SET A · style=${s.id} · page=${page}`;
  history.replaceState(null,'',`?style=${s.id}&page=${page}`);stage.scrollTop=0;
}
function goStyle(d){idx=(idx+d+STYLES.length)%STYLES.length;labPick=false;ingameMenu=false;render();}
function goPage(k){if(ORDER.includes(k)){page=k;labPick=false;ingameMenu=false;render();}}
document.getElementById('prev').onclick=()=>goStyle(-1);
document.getElementById('next').onclick=()=>goStyle(1);
window.addEventListener('keydown',e=>{const t=e.target.tagName;if(t==='INPUT'||t==='TEXTAREA'||e.target.isContentEditable)return;
  if(e.key==='ArrowLeft')goStyle(-1);else if(e.key==='ArrowRight')goStyle(1);else if(/^[1-6]$/.test(e.key))goPage(ORDER[+e.key-1]);});
stage.addEventListener('click',e=>{
  const nav=e.target.closest('[data-page]');if(nav){goPage(nav.dataset.page);return;}
  const ig=e.target.closest('[data-ingame]');if(ig){ingameMenu=ig.dataset.ingame==='open';render();return;}
  const lp=e.target.closest('[data-labpick]');if(lp){toast(lp.dataset.act||'started (mock)');labPick=false;render();return;}
  const lb=e.target.closest('[data-labback]');if(lb){labPick=false;render();return;}
  const ls=e.target.closest('[data-labslot]');if(ls){labPick=true;render();return;}
  const act=e.target.closest('[data-act]');if(act){toast(act.dataset.act);act.classList.add('flash');setTimeout(()=>act.classList.remove('flash'),400);}
});
let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1300);}
if(STYLES.length)render();
</script>
</body>
</html>
