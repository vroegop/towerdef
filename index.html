<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arena - Hero vs Horde</title>
<!-- PWA: installable + cached for quick startup (service worker registered in src/main.ts). Paths are
     relative so the app works from any sub-path (GitHub Pages project sites included). -->
<meta name="theme-color" content="#070910">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arena">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap">
<style>
  html,body{margin:0;height:100%;background:#070910;overflow:hidden;
    font-family:'Roboto',system-ui,-apple-system,Segoe UI,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #game{position:fixed;inset:0;width:100%;height:100%;display:block}
  #hud{}
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>

  <!-- The entire game is an ES-module graph rooted here; Vite bundles it. -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
