<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arena - Hero vs Horde</title>
<link rel="stylesheet" href="hud/hud.css">
<style>
  html,body{margin:0;height:100%;background:#070910;overflow:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #game{position:fixed;inset:0;width:100%;height:100%;display:block}
  #hud{}
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>

  <!-- SIM (no browser deps) -->
  <script src="sim/rng.js"></script>
  <script src="sim/registries.js"></script>
  <script src="sim/waves.js"></script>
  <script src="sim/skills.js"></script>
  <script src="sim/labs.js"></script>
  <script src="sim/enemies.js"></script>
  <script src="sim/abilities.js"></script>
  <script src="sim/projectiles.js"></script>
  <script src="sim/state.js"></script>
  <script src="sim/core.js"></script>
  <script src="sim/offline.js"></script>
  <!-- RENDER / HUD -->
  <script src="renderers/canvas2d/renderer.js"></script>
  <script src="hud/hud.js"></script>

  <script>
  (function () {
    const A = window.ARENA;
    const DT = A.DT, SAVE = 'arena.save', METAK = 'arena.meta', SETK = 'arena.settings', OFFLINE_CAP = 12 * 3600;

    // visual-indicator settings (default ON); shared by reference with the renderer + HUD
    function loadSettings() {
      let s = {}; try { s = JSON.parse(localStorage.getItem(SETK)) || {}; } catch (e) {}
      return { goldOnKill: s.goldOnKill !== false, coreOnKill: s.coreOnKill !== false, enemyHp: s.enemyHp !== false, damageNumbers: s.damageNumbers !== false };
    }
    function saveSettings() { localStorage.setItem(SETK, JSON.stringify(settings)); }

    function loadMeta() {
      let m = {}; try { m = JSON.parse(localStorage.getItem(METAK)) || {}; } catch (e) {}
      const meta = {
        cores: m.cores || 0, perm: m.perm || {}, hasPlayed: !!m.hasPlayed,
        bestWave: m.bestWave || 0, claimedMilestones: m.claimedMilestones || {}, tier: m.tier || 1, coreMult: m.coreMult || 1,
        tierBest: m.tierBest || {}, // furthest wave reached per tier (gates tier unlocks)
        tokens: m.tokens || 0, cards: m.cards || [], cardBuys: m.cardBuys || 0, starBuys: m.starBuys || 0,
        totalWaves: m.totalWaves || 0, waveTokensGranted: m.waveTokensGranted || 0, // 1 token per 100 cumulative waves
        labs: m.labs || {}, research: Array.isArray(m.research) ? m.research : [], labSlots: m.labSlots || 1, cells: m.cells || 0,
        ultimates: m.ultimates || {}, ver: m.ver || 0,
      };
      return A.migrateMeta ? A.migrateMeta(meta) : meta;
    }
    function saveMeta() { localStorage.setItem(METAK, JSON.stringify(meta)); }
    function loadSave() { try { return JSON.parse(localStorage.getItem(SAVE)); } catch (e) { return null; } }
    function clearSave() { localStorage.removeItem(SAVE); }

    const meta = loadMeta();
    const settings = loadSettings();
    const canvas = document.getElementById('game');
    const renderer = A.Canvas2DRenderer(canvas, settings);
    const hud = A.Hud(document.getElementById('hud'), {
      settings, onSaveSettings: saveSettings,
      onBuyRun: (stat) => { if (sim) A.buyRunUpgrade(sim.s, stat); },
      onBuyPerm: (id) => { const ok = A.buyPerm(meta, id); if (ok) saveMeta(); return ok; },
      onClaimMilestone: (wave) => { const r = A.claimMilestone(meta, wave); if (r) saveMeta(); return r; },
      onSetTier: (t) => { t = t | 0; if (t < 1 || t > A.MAX_TIER || !A.tierUnlocked(meta, t)) return false; meta.tier = t; saveMeta(); return true; },
      onBuyCard: () => { const r = A.buyCard(meta); if (r) saveMeta(); return r; },
      onUpgradeCard: () => { const r = A.upgradeRandomCard(meta); if (r) saveMeta(); return r; },
      onStartResearch: (id) => { const ok = A.startResearch(meta, id, Date.now()); if (ok) saveMeta(); return ok; },
      onCancelResearch: (id) => { const ok = A.cancelResearch(meta, id); if (ok) saveMeta(); return ok; },
      onBuyLabSlot: () => { const ok = A.buyLabSlot(meta); if (ok) saveMeta(); return ok; },
      onReconcileLabs: () => reconcileLabs(),
      onStartRun: () => startRun(false),
      onExitRun: () => { if (mode === 'playing' || mode === 'dying') enterOverview(bankRun()); }, // bank + skip the death anim
      onToWorkshop: () => { hud.hideOverview(); goToMenu({}); },
      onDev: (kind) => {
        if (kind === 'reset') { localStorage.clear(); location.reload(); }
        else if (kind === 'cores') { meta.cores = 999999; saveMeta(); hud.refreshMenu(meta); }
        else if (kind === 'gold') { if (sim) sim.s.econ.gold = 999999; }
        else if (kind === 'tokens') { meta.tokens = 999999; saveMeta(); hud.refreshMenu(meta); }
        else if (kind === 'lightning') {
          if (sim) {
            sim.s.atkMode = sim.s.atkMode === 'lightning' ? 'bullet' : 'lightning';
            hud.setDevToggle('lightning', sim.s.atkMode === 'lightning');
          }
        }
        else if (kind === 'pause') { togglePause(); }
        else if (kind === 'testbullet') { setupTestBullet(); }
      },
      onFF: (sec) => {
        if (mode !== 'playing' || !sim || !sim.s.alive || paused) return;
        const r = gsCatchUp(sec, 24 * 3600);
        if (!sim.s.alive) { enterOverview(bankRun()); return; }
        hud.showHint('Fast-forwarded ' + (sec >= 60 ? (sec / 60) + 'm' : sec + 's') + ': +' + r.gold + ' gold / +' + r.kills + ' kills');
        setTimeout(() => hud.hideHint(), 2500);
      },
    });

    hud.setMeta(meta);
    let sim = null, mode = 'menu', acc = 0, last = 0, running = false, hiddenAt = 0, paused = false, dyingT = 0;

    // Labs advance on the wall clock, outside the deterministic run sim. Reconcile finished
    // research on boot, on focus, and on a periodic tick; persist + refresh the menu if anything
    // completed so a returning player sees their research already done.
    function reconcileLabs() {
      if (!A.reconcileResearch) return;
      const done = A.reconcileResearch(meta, Date.now());
      if (done.length) { saveMeta(); hud.refreshMenu(meta); }
      return done;
    }
    // offline catch-up scaled by the game-speed lab (more sim seconds per real second).
    function gsCatchUp(elapsedSec, capSec) { const gs = A.gameSpeed ? A.gameSpeed(meta) : 1; return A.catchUp(sim, elapsedSec * gs, capSec * gs); }

    // dev pause: freezes the sim loop AND the render clock (renderer uses rdt=0), so every
    // effect — bullets, sparks, shatter, lightning — holds still for inspection.
    function togglePause(on) {
      if (mode !== 'playing' || !sim) return;
      paused = (on === undefined) ? !paused : !!on;
      hud.setDevToggle('pause', paused);
    }

    // dev: overwrite the live state with a deterministic 1-enemy + 1-bullet frame, then pause,
    // so the bullet renders at a known spot every time.
    function setupTestBullet() {
      if (!sim) return;
      const s = sim.s, hx = s.hero.x, hy = s.hero.y;
      s.atkMode = 'bullet';
      const e = A.makeEnemy(s.nextId++, 'melee', 'average', Math.max(1, s.wave.n), sim.rng, s.arena);
      e.x = hx + 140; e.y = hy; e.hitFlash = 0; e.kb = 0; // fixed in-range target to the right
      s.enemies = [e];
      s.projectiles = [{ id: s.nextId++, x: hx + 70, y: hy, vx: A.BULLET_SPEED, vy: 0, r: A.BULLET_R, dmg: 1, traveled: 70, maxDist: 1000 }];
      togglePause(true);
      renderer.draw(s, 0, true);
    }

    // ---- input ----
    window.addEventListener('keydown', (e) => {
      if (e.key === ' ') { e.preventDefault(); togglePause(); } // dev: spacebar pauses a run
    });

    // ---- states ----
    function startRun(firstRun) {
      const seed = (Math.random() * 4294967296) >>> 0;
      sim = new A.Sim(A.createState(seed, meta, firstRun));
      mode = 'playing';
      hud.hideMenu(); hud.hideOverview();
      hud.hideHint();
      acc = 0; last = performance.now(); running = true; togglePause(false);
      requestAnimationFrame(frame);
    }

    function goToMenu(opts) {
      mode = 'menu'; running = false; clearSave();
      if (A.grantInitialCard(meta)) saveMeta(); // own one of every card type (from the start)
      hud.hideHint();
      hud.showMenu(meta, opts || {});
    }

    // Bank end-of-run rewards into meta; returns the earn summary the overview shows.
    function bankRun() {
      const firstRunJustEnded = !meta.hasPlayed;
      const wave = sim.s.wave.maxWave || sim.s.wave.n;
      const cores = firstRunJustEnded
        ? A.FIRST_PERM_COST // exactly enough to raise attack speed (tutorial grant, not tier-scaled)
        : Math.max(1, Math.round(((Math.floor(sim.s.econ.kills / 10) + (sim.s.wave.maxWave || 0)) + (sim.s.econ.bonusCores || 0)) * A.coreMult(meta.tier || 1)));
      meta.cores = (meta.cores || 0) + cores;
      meta.bestWave = Math.max(meta.bestWave || 0, wave);
      const runTier = meta.tier || 1; // this run played at the selected tier; credit its furthest wave
      meta.tierBest = meta.tierBest || {};
      meta.tierBest[runTier] = Math.max(meta.tierBest[runTier] || 0, wave);
      // card tokens: 1 per 100 waves, accumulated across separate runs (remainder carries over)
      meta.totalWaves = (meta.totalWaves || 0) + wave;
      const tokensDue = Math.floor(meta.totalWaves / 100) - (meta.waveTokensGranted || 0);
      let tokens = 0;
      if (tokensDue > 0) { tokens = tokensDue; meta.tokens = (meta.tokens || 0) + tokens; meta.waveTokensGranted = (meta.waveTokensGranted || 0) + tokens; }
      if (firstRunJustEnded) meta.hasPlayed = true;
      saveMeta();
      return { cores, kills: sim.s.econ.kills, wave, tokens };
    }

    // Live death: explode (renderer detects it), let enemies drift in for ~1s, then overview.
    function startDying() { mode = 'dying'; dyingT = 0; running = true; hud.hideOverview(); hud.hideHint(); last = performance.now(); requestAnimationFrame(frame); }
    function enterOverview(earn) { mode = 'overview'; running = false; clearSave(); hud.hideHint(); hud.showOverview(meta, earn); }

    // ---- main loop: fixed-step sim, free-rate render ----
    function frame(now) {
      if (!running || (mode !== 'playing' && mode !== 'dying')) return;
      const dt = Math.min((now - last) / 1000, 0.25); last = now;
      if (mode === 'dying') { // ~1s post-death flourish: enemies drift in, hero shatter plays out
        dyingT += dt; A.tickDying(sim.s, dt); renderer.draw(sim.s, 1, false); // live positions: no interp
        if (dyingT >= 1) { enterOverview(bankRun()); return; }
        requestAnimationFrame(frame); return;
      }
      if (paused) { renderer.draw(sim.s, 0, true); hud.update(sim.s); requestAnimationFrame(frame); return; }
      // game-speed lab folds into the STEP COUNT, never the DT — each step stays bit-identical,
      // we just run more of them per real second (and raise the per-frame guard to match).
      const gs = A.gameSpeed ? A.gameSpeed(meta) : 1;
      acc += dt * gs;
      let g = 0; const maxSteps = Math.ceil(8 * gs);
      while (acc >= DT && g++ < maxSteps) { sim.step(DT); acc -= DT; }
      renderer.draw(sim.s, acc / DT, false); // alpha = how far we are toward the next tick
      hud.update(sim.s);
      if (!sim.s.alive) { startDying(); return; }
      requestAnimationFrame(frame);
    }

    // ---- persistence (only a mid-run is ever saved) ----
    function persist() { if (sim) localStorage.setItem(SAVE, JSON.stringify({ savedAt: Date.now(), state: sim.serialize() })); }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (mode === 'playing' && sim && sim.s.alive) { hiddenAt = Date.now(); persist(); }
        running = false;
      } else if (mode === 'playing' && sim && sim.s.alive) {
        reconcileLabs();
        const el = hiddenAt ? (Date.now() - hiddenAt) / 1000 : 0;
        if (el > 2 && !paused) {
          const r = gsCatchUp(el, OFFLINE_CAP);
          if (!sim.s.alive) { enterOverview(bankRun()); return; } // died while away: no animation, straight to overview
          if (el > 20) { hud.showHint('While away: +' + r.gold + ' gold / +' + r.kills + ' kills'); setTimeout(() => hud.hideHint(), 2500); }
        }
        last = performance.now(); running = true; requestAnimationFrame(frame);
      } else {
        reconcileLabs(); // finished research while idling in a menu
      }
    });
    window.addEventListener('pagehide', () => { if (mode === 'playing' && sim && sim.s.alive) persist(); });
    setInterval(() => { if (mode === 'playing' && running && sim && sim.s.alive) persist(); }, 10000);
    // complete finished research while the player sits in a menu (the menu polls this to update bars)
    setInterval(reconcileLabs, 5000);

    // ---- boot ----
    reconcileLabs(); // complete any research that finished while the game was closed
    const saved = loadSave();
    if (saved && saved.state) {
      // resume an interrupted run + catch up the gap
      saved.state.meta = meta;
      sim = new A.Sim(saved.state); mode = 'playing';
      const elapsed = (Date.now() - saved.savedAt) / 1000;
      if (elapsed > 2) { const r = gsCatchUp(elapsed, OFFLINE_CAP); if (elapsed > 20 && sim.s.alive) { hud.showHint('While away: +' + r.gold + ' gold / +' + r.kills + ' kills'); setTimeout(() => hud.hideHint(), 2500); } }
      if (!sim.s.alive) { enterOverview(bankRun()); }
      else { hud.hideMenu(); last = performance.now(); running = true; requestAnimationFrame(frame); }
    } else if (!meta.hasPlayed) {
      startRun(true); // the scripted ~10s first run
    } else {
      goToMenu({});
    }
  })();
  </script>
</body>
</html>
