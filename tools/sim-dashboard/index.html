<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena · Progression Sim Dashboard</title>
    <style>
      :root { color-scheme: dark; --bg:#15171c; --panel:#1e2128; --panel2:#262a33; --line:#333845;
        --txt:#e6e8ee; --dim:#9aa3b2; --accent:#5b8cff; --good:#46c98b; --warn:#e0b341; --bad:#e0654f; }
      * { box-sizing: border-box; }
      body { margin:0; font:14px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
        background:var(--bg); color:var(--txt); }
      header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; }
      header h1 { font-size:16px; margin:0; font-weight:650; }
      header .sub { color:var(--dim); font-size:12px; }
      .wrap { display:grid; grid-template-columns:330px 1fr; gap:0; height:calc(100vh - 51px); }
      .side { border-right:1px solid var(--line); padding:14px; overflow:auto; }
      .runs { padding:14px; overflow:auto; display:flex; flex-direction:column; gap:12px; }
      h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin:0 0 8px; }
      label { display:block; font-size:12px; color:var(--dim); margin:8px 0 2px; }
      input, select { width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
        border-radius:6px; padding:6px 8px; font:inherit; }
      .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
      .row2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
      button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:8px 12px;
        font:inherit; font-weight:600; cursor:pointer; }
      button.ghost { background:var(--panel2); color:var(--txt); border:1px solid var(--line); }
      button.tiny { padding:3px 8px; font-size:12px; }
      .btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
      .card .hd { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line); }
      .card .hd .nm { font-weight:650; }
      .card .hd .st { font-size:12px; color:var(--dim); margin-left:auto; }
      .bar { height:5px; background:var(--panel2); }
      .bar > i { display:block; height:100%; width:0; background:var(--accent); transition:width .3s; }
      .card.done .bar > i { background:var(--good); } .card.wall .bar > i { background:var(--warn); }
      .card.err .bar > i { background:var(--bad); }
      .meta { display:flex; flex-wrap:wrap; gap:6px 16px; padding:8px 12px; font-size:12px; color:var(--dim); }
      .meta b { color:var(--txt); font-weight:600; }
      table { border-collapse:collapse; width:100%; font-size:12px; }
      th, td { text-align:right; padding:3px 8px; border-top:1px solid var(--line); white-space:nowrap; }
      th { color:var(--dim); font-weight:600; }
      td:first-child, th:first-child { text-align:left; }
      tr.wall td { color:var(--warn); }
      .hint { color:var(--dim); font-size:11px; margin-top:4px; }
      .boosts { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
      .boosts .b { display:grid; grid-template-columns:1fr 56px; align-items:center; gap:4px; }
      .boosts .b span { font-size:11px; color:var(--dim); }
    </style>
  </head>
  <body>
    <header>
      <h1>Progression Sim Dashboard</h1>
      <span class="sub">runs the real game headlessly in Web Workers · edit a profile, run many at once, compare</span>
    </header>
    <div class="wrap">
      <aside class="side" id="side"></aside>
      <main class="runs" id="runs"></main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
