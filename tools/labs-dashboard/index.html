<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena · Labs Balancing Dashboard</title>
    <style>
      :root { color-scheme: dark; --bg:#15171c; --panel:#1e2128; --panel2:#262a33; --line:#333845;
        --txt:#e6e8ee; --dim:#9aa3b2; --accent:#5b8cff; --good:#46c98b; --warn:#e0b341; --bad:#e0654f;
        --attack:#e0654f; --defense:#5b8cff; --economic:#46c98b; --speed:#e0b341; }
      * { box-sizing: border-box; }
      body { margin:0; font:14px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
        background:var(--bg); color:var(--txt); }
      header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
      header h1 { font-size:16px; margin:0; font-weight:650; }
      header .sub { color:var(--dim); font-size:12px; }
      .toolbar { position:sticky; top:0; z-index:5; background:var(--bg); border-bottom:1px solid var(--line);
        padding:10px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
      button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:8px 12px;
        font:inherit; font-weight:600; cursor:pointer; }
      button.ghost { background:var(--panel2); color:var(--txt); border:1px solid var(--line); }
      button.tiny { padding:3px 8px; font-size:12px; }
      button:disabled { opacity:.5; cursor:not-allowed; }
      .grow { flex:1; }
      main { padding:14px 18px 60px; }
      section { margin-bottom:26px; }
      section > h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim);
        margin:0 0 4px; }
      section > .secsub { color:var(--dim); font-size:12px; margin:0 0 12px; }
      label { display:block; font-size:11px; color:var(--dim); margin:0 0 2px; }
      input, select { width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
        border-radius:6px; padding:5px 7px; font:inherit; }
      input:disabled, select:disabled { opacity:.55; }
      input[type=checkbox] { width:auto; }

      /* lab card */
      .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; margin-bottom:14px;
        overflow:hidden; }
      .card.suggested { border-left:3px solid var(--warn); }
      .card .hd { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line);
        background:var(--panel2); flex-wrap:wrap; }
      .card .hd .catdot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
      .card .hd .title { font-weight:650; font-size:15px; }
      .card .hd .badge { font-size:10px; text-transform:uppercase; letter-spacing:.05em; padding:2px 6px;
        border-radius:99px; background:var(--warn); color:#15171c; font-weight:700; }
      .card .hd .right { margin-left:auto; display:flex; gap:6px; align-items:center; }

      .body { padding:12px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      @media (max-width:880px){ .body { grid-template-columns:1fr; } }
      .fieldgrid { display:grid; gap:8px; }
      .g2 { grid-template-columns:1fr 1fr; }
      .g3 { grid-template-columns:1fr 1fr 1fr; }
      .block { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:10px; }
      .block h3 { margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);
        display:flex; align-items:center; gap:8px; }
      .block h3 .livetoggle { margin-left:auto; display:flex; align-items:center; gap:5px; font-size:11px;
        text-transform:none; letter-spacing:0; color:var(--dim); cursor:pointer; }
      .block h3 .livetoggle label { margin:0; cursor:pointer; }

      /* chips / computed outputs */
      .chips { display:flex; flex-wrap:wrap; gap:6px 8px; padding:0 12px 12px; }
      .chip { background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:5px 9px; font-size:12px; }
      .chip .k { color:var(--dim); } .chip b { color:var(--txt); }
      .chip.good b { color:var(--good); } .chip.warn b { color:var(--warn); }

      /* breakdown */
      details { margin:0 12px 12px; }
      details > summary { cursor:pointer; color:var(--accent); font-size:12px; user-select:none; }
      table { border-collapse:collapse; width:100%; font-size:12px; margin-top:8px; }
      th, td { text-align:right; padding:3px 8px; border-top:1px solid var(--line); white-space:nowrap; }
      th { color:var(--dim); font-weight:600; position:sticky; top:0; background:var(--panel); }
      td:first-child, th:first-child { text-align:left; }
      .scroll { max-height:340px; overflow:auto; border:1px solid var(--line); border-radius:6px; }

      /* summary */
      .summary { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:18px; }
      .summary table { margin-top:0; }
      .rationale { padding:0 12px 12px; color:var(--dim); font-size:12px; }
      .rationale b { color:var(--txt); }
      .combo { margin:0 12px 12px; padding:8px 10px; background:var(--panel2); border:1px solid var(--line);
        border-radius:8px; font-size:12px; color:var(--dim); }
      .combo b { color:var(--good); font-weight:650; }
      .combo .k { text-transform:uppercase; letter-spacing:.04em; font-size:10px; color:var(--dim); margin-right:4px; }

      .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--good);
        color:#0c1410; padding:10px 16px; border-radius:8px; font-weight:600; box-shadow:0 6px 24px #0008;
        opacity:0; transition:opacity .2s; pointer-events:none; }
      .toast.show { opacity:1; }

      /* import overlay */
      .overlay { position:fixed; inset:0; background:#000a; display:none; align-items:center; justify-content:center; z-index:20; }
      .overlay.show { display:flex; }
      .overlay .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px;
        width:min(680px, 92vw); }
      .overlay textarea { width:100%; height:300px; background:var(--panel2); border:1px solid var(--line);
        color:var(--txt); border-radius:6px; padding:8px; font:12px/1.4 ui-monospace,Menlo,Consolas,monospace; }
      .overlay .btns { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Labs Balancing Dashboard</h1>
      <span class="sub">current labs are read live from <code>src/sim/labs.ts</code> · edit anything, export the JSON, hand it back to have it coded into the game</span>
    </header>
    <div class="toolbar">
      <button id="export">⬇ Export JSON</button>
      <button id="copy" class="ghost">⧉ Copy JSON</button>
      <button id="import" class="ghost">⬆ Import JSON</button>
      <button id="add" class="ghost">＋ Add custom lab</button>
      <button id="reset" class="ghost">↺ Reset to game defaults</button>
      <span class="grow"></span>
      <span class="sub" id="counts"></span>
    </div>
    <main id="app"></main>

    <div class="overlay" id="importOverlay">
      <div class="panel">
        <h2 style="margin:0 0 8px">Import labs JSON</h2>
        <p class="sub" style="margin:0 0 8px">Paste a previously exported dashboard JSON to restore those values.</p>
        <textarea id="importText" placeholder="{ &quot;version&quot;: 1, &quot;labs&quot;: [ ... ] }"></textarea>
        <div class="btns">
          <button class="ghost" id="importCancel">Cancel</button>
          <button id="importLoad">Load</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
