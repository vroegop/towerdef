<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Arena · Super Weapons art gallery</title><style>
:root{color-scheme:dark;--offense:#ff7a4d;--defense:#4fb6e0;--utility:#b08bff;--economy:#f0c94a}
body{margin:0;background:#14161b;color:#e6e8ee;font:14px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif}
header{padding:16px 22px;border-bottom:1px solid #333845}h1{margin:0;font-size:17px}
.sub{color:#9aa3b2;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:20px}
.tile{margin:0;background:#1e2128;border:1px solid #333845;border-radius:12px;overflow:hidden}
.arena{aspect-ratio:1;position:relative;background:radial-gradient(circle at 50% 46%,#232834,#161922 60%,#0f1117)}
.ring{position:absolute;inset:16%;border-radius:50%;border:1px dashed rgba(255,255,255,.12)}
.tower{position:absolute;left:50%;top:50%;width:12px;height:12px;margin:-6px;border-radius:50%;background:#cdd6e6;box-shadow:0 0 10px #cdd6e6}
.art{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.cat-offense .art{color:var(--offense)}.cat-defense .art{color:var(--defense)}
.cat-utility .art{color:var(--utility)}.cat-economy .art{color:var(--economy)}
figcaption{padding:10px 12px}figcaption b{font-size:14px}
.cat{font-size:11px;text-transform:capitalize;margin:2px 0 4px}
.cat-offense{color:var(--offense)}.cat-defense{color:var(--defense)}.cat-utility{color:var(--utility)}.cat-economy{color:var(--economy)}
figcaption p{margin:4px 0 0;color:#9aa3b2;font-size:12px}
.b{font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.b.new{color:#14161b;background:#46c98b}.b.live{color:#9aa3b2;border:1px solid #333845}
</style></head><body>
<header><h1>Super Weapons — example art</h1>
<div class="sub">13 weapons (3 live, 10 proposed) · the dot is the tower, the dashed circle its range · tinted by category · tune them all in <code>npm run super:dashboard</code></div></header>
<div class="grid">
    <figure class="tile">
      <div class="arena cat-offense">
        <div class="ring"></div><div class="tower"></div>
        <div class="art"><svg class="wart wart-golden" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 5 13h4.6l-2 9 9.4-12.4H12l3-7.6z" fill="#f4c64a" stroke="#caa233" stroke-width="1"/><g class="spark"><path d="M19 3.6l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z" fill="#fff" stroke="none"/></g><path d="M4.2 19.2l.5 1.4 1.4.5-1.4.5-.5 1.4-.5-1.4-1.4-.5 1.4-.5z" fill="#ffe9a8" stroke="none"/></svg></div>
      </div>
      <figcaption>
        <b>Golden Lightning</b><span class="b live">LIVE</span>
        <div class="cat cat-offense">offense</div>
        <p>For a burst, lightning turns gold and every kill pays far more gold & coins.</p>
      </figcaption>
    </figure>
    <figure class="tile">
      <div class="arena cat-defense">
        <div class="ring"></div><div class="tower"></div>
        <div class="art"><svg class="wart wart-moat" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.4" stroke="#4fb6e0" stroke-opacity=".55" stroke-dasharray="1.5 2.6"/><circle cx="12" cy="12" r="6.6" fill="#2f7fa8" fill-opacity=".32" stroke="#4fb6e0"/><path d="M5.8 12c1-1 2-1 3 0s2 1 3 0 2-1 3 0 2 1 3 0" stroke="#bfeaff" stroke-width="1" fill="none"/><path d="M9.2 15.4 12 9.6l2.8 5.8z" fill="#d8c39a" stroke="#8a6d44"/><path d="M10.6 15.4v-2.2h2.8v2.2" stroke="#8a6d44" stroke-width="1"/></svg></div>
      </div>
      <figcaption>
        <b>Moat</b><span class="b live">LIVE</span>
        <div class="cat cat-defense">defense</div>
        <p>A dry trench rings the tower; periodically it floods, slowing everything caught in it.</p>
      </figcaption>
    </figure>
    <figure class="tile">
      <div class="arena cat-utility">
        <div class="ring"></div><div class="tower"></div>

      </div>
      <figcaption>
        <b>Crystal Circle</b><span class="b live">LIVE</span>
        <div class="cat cat-utility">utility</div>
        <p>Crystals orbit and instakill on contact for gems; survivors burst into shards that fly into the fog.</p>
      </figcaption>
    </figure>
    <figure class="tile">
      <div class="arena cat-offense">
        <div class="ring"></div><div class="tower"></div>
        <div class="art"><svg class="wart wart-meteor" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 2.6 13 11" stroke="#ff8a3c" stroke-width="2.2"/><path d="M22 5 17 10M19 2 14.5 6.5" stroke="#ffd08a" stroke-width="1.1"/><circle cx="11" cy="13" r="3.6" fill="#ff6a2c" stroke="#b23c12"/><circle cx="10" cy="12" r="1.1" fill="#ffd9b0" stroke="none"/><path d="M3.5 20.5c1.8-2.2 3.8-2.2 5 0M8.5 21.5c1.2-1.6 3-1.6 4.2 0" stroke="#ff8a3c" stroke-width="1.3"/></svg></div>
      </div>
      <figcaption>
        <b>Meteor Storm</b><span class="b new">NEW</span>
        <div class="cat cat-offense">offense</div>
        <p>Meteors rain across the arena, each cratering for heavy splash damage in a blast radius.</p>
      </figcaption>
    </figure>
    <figure class="tile">
      <div class="arena cat-offense">
        <div class="ring"></div><div class="tower"></div>
        <div class="art"><svg class="wart wart-tesla" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="4.2" cy="6" r="1.7" fill="#9fe0ff" stroke="#37d7ff"/><circle cx="19.8" cy="18" r="1.7" fill="#9fe0ff" stroke="#37d7ff"/><path d="M5.4 7.2 9 8.2 7 11.4l4.4 1L9 15.6l4.6 1-2 3.1" stroke="#cfeeff" stroke-width="1.7"/><path d="M5.4 7.2 9 8.2 7 11.4l4.4 1L9 15.6l4.6 1-2 3.1" stroke="#37d7ff" stroke-width=".7"/></svg></div>
      </div>
      <figcaption>
        <b>Chain Tesla</b><span class="b new">NEW</span>
        <div class="cat cat-offense">offense</div>
        <p>A charged arc leaps to the nearest enemy and chains onward, splitting more with every level.</p>

    </figure>
    <figure class="tile">
      <div class="arena cat-offense">
        <div class="ring"></div><div class="tower"></div>

      <figcaption>

    <figure class="tile">
      <div class="arena cat-defense">
        <div class="ring"></div><div class="tower"></div>
