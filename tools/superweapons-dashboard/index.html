<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena · Super Weapons — Design &amp; Balance</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14161b; --panel: #1e2128; --panel2: #262a33; --panel3: #2d323d; --line: #333845;
        --txt: #e6e8ee; --dim: #9aa3b2; --faint: #6b7384;
        --accent: #5b8cff; --good: #46c98b; --warn: #e0b341; --bad: #e0654f;
        --offense: #ff7a4d; --defense: #4fb6e0; --utility: #b08bff; --economy: #f0c94a;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font: 14px/1.45 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
        background: var(--bg); color: var(--txt); }
      header { padding: 13px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
      header h1 { font-size: 16px; margin: 0; font-weight: 650; }
      header .sub { color: var(--dim); font-size: 12px; }
      header .spacer { flex: 1; }
      .wrap { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 50px); }
      .side { border-right: 1px solid var(--line); overflow: auto; }
      .main { overflow: auto; padding: 16px 20px 60px; }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--dim); margin: 0 0 8px; }
      label { display: block; font-size: 11px; color: var(--dim); margin: 8px 0 2px; }
      input, select, textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--txt);
        border-radius: 6px; padding: 6px 8px; font: inherit; }
      textarea { resize: vertical; min-height: 54px; }
      input[type="number"] { -moz-appearance: textfield; }
      .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
      button { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: 8px 12px;
        font: inherit; font-weight: 600; cursor: pointer; }
      button:hover { filter: brightness(1.08); }
      button.ghost { background: var(--panel2); color: var(--txt); border: 1px solid var(--line); }
      button.tiny { padding: 3px 8px; font-size: 12px; }
      button.danger { background: #3a2628; color: #ffb4a8; border: 1px solid #5a3338; }
      .btns { display: flex; gap: 8px; flex-wrap: wrap; }

      /* ── sidebar weapon list ── */
      .side .pad { padding: 14px; }
      .wlist { display: flex; flex-direction: column; gap: 6px; }
      .witem { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 10px;
        background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px;
        cursor: pointer; text-align: left; color: var(--txt); }
      .witem:hover { border-color: #44506a; }
      .witem.sel { border-color: var(--accent); background: #20242e; }
      .witem .thumb { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 8px;
        background: radial-gradient(circle at 50% 40%, #20242e, #14161b); border: 1px solid var(--line); }
      .witem .nm { font-weight: 600; font-size: 13px; }
      .witem .meta { font-size: 11px; color: var(--dim); margin-top: 1px; }
      .witem .tag { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid currentColor; }
      .cat-offense { color: var(--offense); } .cat-defense { color: var(--defense); }
      .cat-utility { color: var(--utility); } .cat-economy { color: var(--economy); }
      .badge-new { font-size: 9px; font-weight: 700; letter-spacing: .04em; color: #14161b; background: var(--good);
        border-radius: 4px; padding: 1px 4px; margin-left: 6px; vertical-align: middle; }
      .badge-live { font-size: 9px; font-weight: 700; letter-spacing: .04em; color: var(--dim);
        border: 1px solid var(--line); border-radius: 4px; padding: 1px 4px; margin-left: 6px; vertical-align: middle; }

      /* ── editor ── */
      .editor { display: grid; grid-template-columns: 260px 1fr; gap: 18px; align-items: start; }
      @media (max-width: 900px) { .editor { grid-template-columns: 1fr; } }
      .preview { position: sticky; top: 0; }
      .arena { aspect-ratio: 1; border-radius: 14px; border: 1px solid var(--line); position: relative; overflow: hidden;
        background: radial-gradient(circle at 50% 46%, #232834 0%, #161922 60%, #0f1117 100%); }
      .arena .ring { position: absolute; inset: 16%; border-radius: 50%; border: 1px dashed rgba(255, 255, 255, .12); }
      .arena .tower { position: absolute; left: 50%; top: 50%; width: 12px; height: 12px; margin: -6px;
        border-radius: 50%; background: #cdd6e6; box-shadow: 0 0 10px #cdd6e6; }
      .arena .art { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        filter: drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
      .preview .cap { text-align: center; font-size: 11px; color: var(--faint); margin-top: 8px; }
      .preview .swatches { display: flex; gap: 6px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
      .preview .swatches .sw { width: 34px; height: 34px; border-radius: 7px; display: grid; place-items: center;
        background: var(--panel); border: 1px solid var(--line); cursor: pointer; }
      .preview .swatches .sw.sel { border-color: var(--accent); }

      .fields .row2 { margin-bottom: 4px; }
      .pill { display: inline-block; font-size: 11px; color: var(--dim); background: var(--panel2);
        border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; margin: 0 6px 6px 0; }
      .pill b { color: var(--txt); }

      table.tracks { border-collapse: collapse; width: 100%; margin-top: 6px; }
      table.tracks th, table.tracks td { padding: 5px 6px; border-top: 1px solid var(--line); text-align: center; vertical-align: middle; }
      table.tracks th { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); font-weight: 600; }
      table.tracks td:first-child, table.tracks th:first-child { text-align: left; }
      table.tracks input { padding: 4px 5px; text-align: center; }
      table.tracks input.lbl { text-align: left; }
      table.tracks .num { width: 64px; }
      table.tracks .preview-val { font-size: 11px; color: var(--good); white-space: nowrap; }
      table.tracks .cost-val { font-size: 11px; color: var(--warn); white-space: nowrap; }
      .spark { display: block; }

      .summary { display: flex; gap: 8px 18px; flex-wrap: wrap; margin: 10px 0 4px; font-size: 12px; color: var(--dim); }
      .summary b { color: var(--txt); }
      .summary .e { color: var(--warn); }

      /* ── planner ── */
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
      .plansteps { font-size: 12px; }
      .plansteps .ps { display: grid; grid-template-columns: 22px 1fr auto auto; gap: 8px; align-items: center;
        padding: 4px 0; border-top: 1px solid var(--line); }
      .plansteps .ps:first-child { border-top: 0; }
      .plansteps .ix { color: var(--faint); text-align: right; }
      .plansteps .unlock { color: var(--good); font-weight: 600; }
      .plansteps .cost { color: var(--warn); text-align: right; white-space: nowrap; }
      .plansteps .cum { color: var(--faint); text-align: right; white-space: nowrap; }
      .effbar { height: 5px; border-radius: 3px; background: var(--panel3); overflow: hidden; }
      .effbar > i { display: block; height: 100%; background: var(--accent); }
      .hint { color: var(--faint); font-size: 11px; margin-top: 4px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
      @media (max-width: 1100px) { .grid2 { grid-template-columns: 1fr; } }
      .sectit { display: flex; align-items: center; gap: 10px; margin: 22px 0 8px; }
      .sectit h3 { margin: 0; font-size: 14px; } .sectit .ln { flex: 1; height: 1px; background: var(--line); }
      .wart { color: inherit; }
      details.exp summary { cursor: pointer; color: var(--dim); font-size: 12px; }
      pre.export { background: #0e1014; border: 1px solid var(--line); border-radius: 8px; padding: 10px; overflow: auto;
        font: 11px/1.4 ui-monospace, monospace; max-height: 320px; white-space: pre; }
    </style>
  </head>
  <body>
    <header>
      <h1>Super Weapons — Design &amp; Balance</h1>
      <span class="sub">tune the current powers, design new ones, see the art &amp; the Energy economy</span>
      <span class="spacer"></span>
      <span class="sub" id="dirty"></span>
    </header>
    <div class="wrap">
      <aside class="side" id="side"></aside>
      <main class="main" id="main"></main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
